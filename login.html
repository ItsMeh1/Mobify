<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mobify - Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #fafafa; margin: 0; }
        .login-box { background: white; padding: 40px; border: 2px solid #000; border-radius: 12px; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; margin: 5px 0; cursor: pointer; border-radius: 5px; border: 1px solid #000; font-weight: bold; }
        .google-btn { background: #4285F4; color: white; border: none; }
        .main-btn { background: #000; color: white; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Mobify</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button class="main-btn" id="login-btn">Login</button>
        <button id="signup-btn">Sign Up</button>
        <hr>
        <button class="google-btn" id="google-btn">Sign in with Google</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBprG8pYZ1WQNh2wt0kih3P7Z3nIxhnU5k", //
            authDomain: "mobify-5b3c9.firebaseapp.com",
            projectId: "mobify-5b3c9",
            storageBucket: "mobify-5b3c9.firebasestorage.app",
            messagingSenderId: "454093361079",
            appId: "1:454093361079:web:ab1e1093a91a705be3a232"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // If user is already logged in, send them to the feed
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = "index.html";
        });

        // Email Login
        document.getElementById('login-btn').onclick = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, pass).catch(err => alert(err.message));
        };

        // Google Login
        document.getElementById('google-btn').onclick = () => {
            signInWithPopup(auth, provider).catch(err => alert(err.message));
        };

        // Signup Logic
        document.getElementById('signup-btn').onclick = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            createUserWithEmailAndPassword(auth, email, pass).catch(err => alert(err.message));
        };
    </script>
</body>
</html>
