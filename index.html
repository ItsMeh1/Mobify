<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobify</title>
<style>
  :root {
    --bg: #000000;
    --panel-bg: #16181c;
    --border: #2f3336;
    --text-main: #e7e9ea;
    --text-muted: #71767b;
    --accent: #1d9bf0;
    --accent-hover: #1a8cd8;
  }

  * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { background: var(--bg); color: var(--text-main); display: flex; justify-content: center; height: 100vh; overflow: hidden; }

  /* --- APP LAYOUT --- */
  #app-container { display: none; width: 100%; max-width: 1200px; height: 100vh; }
  .sidebar { width: 275px; border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
  .main { flex: 1; border-right: 1px solid var(--border); overflow-y: auto; scrollbar-width: none; }
  .right-sidebar { width: 350px; padding: 20px; }

  /* --- UI ELEMENTS --- */
  .logo { font-size: 28px; font-weight: 800; padding: 10px; margin-bottom: 20px; color: var(--text-main); text-decoration: none; }
  .nav-item { font-size: 20px; padding: 12px 20px; border-radius: 30px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 15px; }
  .nav-item:hover { background: rgba(231, 233, 234, 0.1); }
  
  .profile-card { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 40px; margin-top: auto; cursor: pointer; transition: 0.2s; }
  .profile-card:hover { background: rgba(231, 233, 234, 0.1); }
  .profile-pic { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; background: #333; }

  /* --- POSTS --- */
  .post { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; cursor: pointer; }
  .post:hover { background: rgba(255, 255, 255, 0.02); }
  .rank-badge { background: #202327; color: var(--accent); font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: bold; margin-left: 8px; }

  /* --- MODERN NEAT MODALS --- */
  .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(91, 112, 131, 0.4); display: none; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(4px); }
  .modal-box { 
    background: var(--bg); width: 100%; max-width: 600px; max-height: 85vh; 
    border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; 
    border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    animation: modalIn 0.2s ease-out;
  }
  @keyframes modalIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .modal-header { padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
  .modal-body { flex: 1; overflow-y: auto; padding: 25px; scrollbar-width: thin; }
  
  .btn-primary { background: var(--accent); color: white; border: none; padding: 10px 24px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.2s; }
  .btn-primary:hover { background: var(--accent-hover); }

  /* --- AUTH --- */
  #auth-container { display: flex; align-items: center; justify-content: center; height: 100vh; width: 100%; }
  .auth-box { background: var(--panel-bg); padding: 40px; border-radius: 20px; width: 380px; text-align: center; border: 1px solid var(--border); }
  .auth-box input { width: 100%; padding: 14px; margin-bottom: 12px; background: #000; border: 1px solid var(--border); border-radius: 8px; color: #fff; }

  .fab { position: fixed; bottom: 30px; right: 30px; width: 55px; height: 55px; border-radius: 50%; background: var(--accent); color: white; display: none; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; box-shadow: 0 8px 20px rgba(29, 155, 240, 0.3); }
</style>
</head>
<body>

<div id="auth-container">
  <div class="auth-box">
    <h1 style="margin-bottom:20px;">Mobify</h1>
    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />
    <button id="loginBtn" class="btn-primary" style="width:100%; margin-bottom:10px;">Log in</button>
    <button id="signupBtn" class="btn-primary" style="width:100%; background:none; border:1px solid var(--accent); color:var(--accent);">Create account</button>
  </div>
</div>

<div id="app-container">
  <div class="sidebar">
    <div class="logo">Mobify</div>
    <div class="nav-item" onclick="location.reload()">🏠 Home</div>
    <div class="nav-item" id="openProfile">👤 Profile</div>
    <div class="nav-item" id="logoutBtn" style="margin-top:10px;">🚪 Logout</div>
    
    <div class="profile-card" id="myProfileTrigger">
      <img id="pfp" class="profile-pic">
      <div class="user-info">
        <h3 id="usernameDisplay">User</h3>
        <p id="handleDisplay" style="color: var(--text-muted); font-size: 13px;">@handle</p>
      </div>
    </div>
  </div>

  <div class="main">
    <div id="feedTitle" class="header">Home</div>
    <div id="feed"></div>
  </div>

  <div class="right-sidebar">
    <input id="search" class="search-bar" style="width:100%; padding:12px 20px; border-radius:30px; background:var(--panel-bg); border:none; color:white; outline:none;" placeholder="Search Mobify..." />
    <div id="trending-list" class="trending-box" style="margin-top:20px;"></div>
  </div>
</div>

<div class="fab" id="openModal">+</div>

<div class="modal" id="postModal">
  <div class="modal-box">
    <div class="modal-header"><span>Draft Post</span><span class="close" style="cursor:pointer">✕</span></div>
    <div class="modal-body">
      <textarea id="postText" placeholder="What's happening?" style="width:100%; height:120px; background:transparent; border:none; color:white; font-size:19px; outline:none; resize:none;"></textarea>
      <input type="file" id="postImgInput" hidden accept="image/*">
      <label for="postImgInput" style="color:var(--accent); cursor:pointer; font-weight:bold;">🖼️ Add Image</label>
    </div>
    <div style="padding:15px 25px; border-top:1px solid var(--border); text-align:right;">
      <button id="submitPost" class="btn-primary">Post</button>
    </div>
  </div>
</div>

<div class="modal" id="profileModal">
  <div class="modal-box">
    <div class="modal-header"><span id="profNameTitle">Profile</span><span class="close" style="cursor:pointer">✕</span></div>
    <div class="modal-body">
        <div style="display:flex; gap:20px; align-items:center;">
            <img id="profPfp" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--accent);">
            <div>
                <h2 id="profName">Name</h2>
                <p id="profHandle" style="color:var(--accent);">@handle</p>
                <p id="profRank" class="rank-badge" style="display:inline-block; margin:5px 0 0 0;">Rank</p>
            </div>
        </div>
        <div id="statusSection" style="margin-top:20px;">
            <p id="profStatus" style="font-style:italic; color:var(--text-muted);">No status set</p>
            <input id="statusInput" placeholder="Update status..." style="display:none; width:100%; background:#111; border:1px solid var(--border); padding:8px; border-radius:8px; color:white; margin-top:10px;">
        </div>
        <hr style="border:none; border-top:1px solid var(--border); margin:20px 0;">
        <h3>Posts</h3>
        <div id="userPostsFeed" style="margin-top:15px;"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, where, doc, getDoc, setDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBprG8pYZ1WQNh2wt0kih3P7Z3nIxhnU5k",
  authDomain: "mobify-5b3c9.firebaseapp.com",
  projectId: "mobify-5b3c9",
  storageBucket: "mobify-5b3c9.firebasestorage.app",
  messagingSenderId: "454093361079",
  appId: "1:454093361079:web:ab1e1093a91a705be3a232"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let postImgBase64 = "";

const toBase64 = f => new Promise((r, j) => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result); rd.onerror = j; });

// --- RENDER POST ---
function createPostHTML(p) {
    const handle = p.username.toLowerCase();
    return `
    <div class="post" onclick="viewProfile('${p.userId}')">
      <img src="${p.userProfilePic}" class="post-avatar">
      <div class="post-body">
        <div style="display:flex; align-items:center;">
            <strong>${p.username}</strong>
            <span style="color:var(--text-muted); margin-left:8px;">@${handle}</span>
            <span class="rank-badge">${p.rank || 'Member'}</span>
        </div>
        <div style="margin-top:6px; line-height:1.4;">${p.content}</div>
        ${p.imageURL ? `<img src="${p.imageURL}" style="width:100%; border-radius:15px; margin-top:12px; border:1px solid var(--border);">` : ""}
      </div>
    </div>`;
}

// --- GLOBAL FEED ---
function startFeed() {
  onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
    const feed = document.getElementById("feed");
    feed.innerHTML = "";
    snap.forEach(d => feed.innerHTML += createPostHTML({id: d.id, ...d.data()}));
  });
}

// --- PROFILE VIEW SYSTEM ---
window.viewProfile = async (uid) => {
    const uDoc = await getDoc(doc(db, "users", uid));
    if(!uDoc.exists()) return;
    const data = uDoc.data();
    
    document.getElementById("profName").textContent = data.name;
    document.getElementById("profHandle").textContent = "@" + data.name.toLowerCase();
    document.getElementById("profPfp").src = data.pfp || "";
    document.getElementById("profRank").textContent = data.rank || "Member";
    document.getElementById("profStatus").textContent = data.status || "No status set";
    
    // Toggle status input if it's MY profile
    const sInput = document.getElementById("statusInput");
    if(currentUser.uid === uid) {
        sInput.style.display = "block";
        sInput.onkeydown = async (e) => {
            if(e.key === 'Enter') {
                await updateDoc(doc(db, "users", uid), { status: sInput.value });
                document.getElementById("profStatus").textContent = sInput.value;
                sInput.value = "";
            }
        };
    } else { sInput.style.display = "none"; }

    // Load User's Posts
    const q = query(collection(db, "posts"), where("userId", "==", uid), orderBy("timestamp", "desc"));
    onSnapshot(q, (snap) => {
        const uFeed = document.getElementById("userPostsFeed");
        uFeed.innerHTML = snap.empty ? "<p>No posts yet.</p>" : "";
        snap.forEach(d => uFeed.innerHTML += createPostHTML(d.data()));
    });

    document.getElementById("profileModal").style.display = "flex";
};

// --- AUTH & SETUP ---
document.getElementById("signupBtn").onclick = async () => {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;
    try {
        const c = await createUserWithEmailAndPassword(auth, email, pass);
        await setDoc(doc(db, "users", c.user.uid), { name: email.split("@")[0], pfp: "", rank: "Member", status: "Hello Mobify!", userId: c.user.uid });
    } catch(e) { alert(e.message); }
};

document.getElementById("loginBtn").onclick = () => signInWithEmailAndPassword(auth, email.value, password.value);
document.getElementById("logoutBtn").onclick = () => signOut(auth);

onAuthStateChanged(auth, async (u) => {
    currentUser = u;
    document.getElementById("auth-container").style.display = u ? "none" : "flex";
    document.getElementById("app-container").style.display = u ? "flex" : "none";
    document.getElementById("openModal").style.display = u ? "flex" : "none";
    if(u) {
        const d = await getDoc(doc(db, "users", u.uid));
        const userData = d.data();
        document.getElementById("usernameDisplay").textContent = userData.name;
        document.getElementById("handleDisplay").textContent = "@" + userData.name.toLowerCase();
        document.getElementById("pfp").src = userData.pfp || "";
        startFeed();
    }
});

// UI Controls
document.getElementById("openModal").onclick = () => document.getElementById("postModal").style.display = "flex";
document.querySelectorAll(".close").forEach(c => c.onclick = () => c.closest(".modal").style.display = "none");
document.getElementById("postImgInput").onchange = async (e) => postImgBase64 = await toBase64(e.target.files[0]);
document.getElementById("openProfile").onclick = () => viewProfile(currentUser.uid);

document.getElementById("submitPost").onclick = async () => {
    const val = document.getElementById("postText").value;
    const d = await getDoc(doc(db, "users", currentUser.uid));
    const u = d.data();
    await addDoc(collection(db, "posts"), {
        content: val, imageURL: postImgBase64, userId: currentUser.uid, username: u.name, userProfilePic: u.pfp, rank: u.rank, timestamp: serverTimestamp()
    });
    document.getElementById("postModal").style.display = "none";
    document.getElementById("postText").value = ""; postImgBase64 = "";
};
</script>
</body>
</html>
