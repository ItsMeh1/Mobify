<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mobify | v4.1</title>
<meta name="color-scheme" content="dark" />
<style>
  :root {
    --bg: #000;
    --bg-elevated: #0b0c0f;
    --panel: #16181c;
    --border: #2f3336;
    --text: #e7e9ea;
    --muted: #71767b;
    --accent: #1d9bf0;
    --danger: #f91880;
    --success: #00ba7c;
    --radius: 16px;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }

  .hidden { display: none !important; }
  button { border: 0; background: none; color: inherit; cursor: pointer; transition: 0.2s; }
  
  /* APP LAYOUT */
  .app-shell { display: none; width: 100%; height: 100vh; max-width: 1250px; margin: 0 auto; display: grid; grid-template-columns: 275px 1fr 350px; }

  /* SIDEBARS */
  .sidebar, .right-sidebar { padding: 20px; border-right: 1px solid var(--border); overflow-y: auto; }
  .right-sidebar { border-right: 0; border-left: 1px solid var(--border); }
  
  .nav-btn { display: flex; align-items: center; gap: 15px; width: 100%; padding: 12px 20px; border-radius: 99px; font-size: 19px; font-weight: 600; margin-bottom: 8px; }
  .nav-btn:hover { background: rgba(255,255,255,0.1); }
  .nav-btn.active { color: var(--accent); }

  /* AVATARS - THE FIX */
  .avatar-container { width: 48px; height: 48px; flex-shrink: 0; }
  .avatar { 
    width: 48px !important; 
    height: 48px !important; 
    border-radius: 50%; 
    object-fit: cover; 
    background: #222; 
    display: block;
  }
  .avatar.large { width: 100px !important; height: 100px !important; }
  .avatar.small { width: 32px !important; height: 32px !important; }

  /* POSTS */
  .main { overflow-y: auto; border-right: 1px solid var(--border); }
  .main-header { position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); padding: 15px 20px; border-bottom: 1px solid var(--border); z-index: 10; }
  
  .post { 
    display: flex; 
    gap: 12px; 
    padding: 16px; 
    border-bottom: 1px solid var(--border); 
    cursor: pointer; 
  }
  .post:hover { background: rgba(255,255,255,0.03); }
  .post-content { flex: 1; min-width: 0; }
  .post-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .post-name { font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .post-handle { color: var(--muted); font-size: 14px; }
  .badge { font-size: 11px; background: var(--accent); color: #fff; padding: 2px 6px; border-radius: 4px; font-weight: 900; }
  
  .post-body { line-height: 1.4; font-size: 15px; word-wrap: break-word; }
  .post-media { width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid var(--border); max-height: 500px; object-fit: cover; }
  
  .post-actions { display: flex; gap: 20px; margin-top: 12px; color: var(--muted); }
  .action-btn { display: flex; align-items: center; gap: 5px; font-size: 13px; }
  .action-btn:hover.like { color: var(--danger); }

  /* SEARCH & TRENDS */
  .search-box { background: var(--panel); border: 1px solid transparent; padding: 10px 15px; border-radius: 99px; width: 100%; color: #fff; margin-bottom: 20px; }
  .search-box:focus { border-color: var(--accent); outline: none; }
  
  .trend-card { background: var(--bg-elevated); border-radius: var(--radius); padding: 15px; border: 1px solid var(--border); }
  .trend-item { padding: 10px 0; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .trend-item:last-child { border: 0; }
  .trend-tag { color: var(--accent); font-weight: 800; display: block; }
  .trend-count { font-size: 12px; color: var(--muted); }

  /* AUTH */
  .auth-screen { display: flex; align-items: center; justify-content: center; height: 100vh; }
  .auth-card { width: 380px; padding: 30px; background: var(--bg-elevated); border-radius: 20px; border: 1px solid var(--border); }
  .input-field { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); border-radius: 8px; color: #fff; margin-bottom: 15px; }

  /* MODAL */
  .modal { position: fixed; inset: 0; background: rgba(91, 112, 131, 0.4); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal-box { background: #000; border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 550px; padding: 25px; position: relative; }

  .fab { position: fixed; bottom: 30px; right: 30px; width: 56px; height: 56px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }

  @media (max-width: 1000px) {
    .right-sidebar { display: none; }
    .app-shell { grid-template-columns: 80px 1fr; }
    .nav-btn span:last-child { display: none; }
  }
</style>
</head>
<body>

<div id="auth-container" class="auth-screen">
  <div class="auth-card">
    <h2 style="margin-top:0">Mobify</h2>
    <form id="authForm">
      <input id="username" class="input-field hidden" type="text" placeholder="Choose Username" />
      <input id="email" class="input-field" type="email" placeholder="Email" required />
      <input id="password" class="input-field" type="password" placeholder="Password" required />
      <button type="submit" id="authSubmitBtn" style="width:100%; padding:12px; background:var(--accent); border-radius:99px; font-weight:800; color:#fff;">Log In</button>
      <button type="button" id="toggleAuthBtn" style="width:100%; margin-top:15px; color:var(--accent); font-size:14px;">Create an account</button>
    </form>
  </div>
</div>

<div id="app-container" class="app-shell" style="display:none;">
  <aside class="sidebar">
    <h2 style="margin-bottom:30px; padding-left:15px">Mobify</h2>
    <nav>
      <button class="nav-btn active" onclick="setFilter(null)"><span>🏠</span> <span>Home</span></button>
      <button class="nav-btn" onclick="document.getElementById('searchInput').focus()"><span>🔥</span> <span>Trending</span></button>
      <button class="nav-btn" id="navMyProfile"><span>👤</span> <span>Profile</span></button>
      <button class="nav-btn" id="logoutBtn" style="color:var(--danger); margin-top:20px"><span>🚪</span> <span>Logout</span></button>
    </nav>
    <div style="margin-top:auto; padding:20px 0; display:flex; align-items:center; gap:10px">
      <img id="myPfp" class="avatar small" src="" />
      <div style="min-width:0">
        <div id="myUsername" style="font-weight:700; overflow:hidden; text-overflow:ellipsis">User</div>
        <div id="myHandle" style="color:var(--muted); font-size:12px">@handle</div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="main-header">
      <h2 id="viewTitle" style="margin:0; font-size:20px">Home</h2>
    </div>
    <div id="feed"></div>
  </main>

  <aside class="right-sidebar">
    <input id="searchInput" class="search-box" type="search" placeholder="Search Mobify..." />
    <div class="trend-card">
      <h3 style="margin-top:0">Trending Tags</h3>
      <div id="trendingList"></div>
    </div>
  </aside>
</div>

<button class="fab" id="openPostModal">+</button>

<div class="modal" id="createPostModal">
  <div class="modal-box">
    <h3 style="margin-top:0">New Post</h3>
    <form id="createPostForm">
      <textarea id="postContent" class="input-field" rows="4" placeholder="What's happening?" style="resize:none; font-family:inherit"></textarea>
      <input type="file" id="postImageFile" accept="image/*" class="hidden" />
      <button type="button" onclick="document.getElementById('postImageFile').click()" style="color:var(--accent); margin-bottom:15px">🖼️ Add Image</button>
      <div id="imagePreviewContainer" class="hidden" style="margin-bottom:15px">
        <img id="imagePreview" style="width:100%; border-radius:10px" />
      </div>
      <button type="submit" id="submitPostBtn" style="width:100%; padding:12px; background:var(--accent); border-radius:99px; font-weight:800; color:#fff;">Post</button>
      <button type="button" onclick="closeModals()" style="width:100%; margin-top:10px; color:var(--muted)">Cancel</button>
    </form>
  </div>
</div>

<div class="modal" id="profileModal">
  <div class="modal-box" style="padding:0; overflow:hidden;">
    <div style="height:100px; background:var(--accent)"></div>
    <div style="padding:20px; position:relative; text-align:center">
      <img id="profPfp" class="avatar large" style="margin:-60px auto 10px; border:4px solid #000" />
      <h2 id="profName" style="margin:0"></h2>
      <p id="profHandle" style="color:var(--muted); margin:5px 0 15px"></p>
      <div id="profStatus" style="background:var(--bg-elevated); padding:15px; border-radius:12px; font-style:italic; margin-bottom:20px"></div>
      <button id="editStatusBtn" class="hidden" style="color:var(--accent); font-size:13px">Edit Status</button>
    </div>
    <div id="userPosts" style="max-height:300px; overflow-y:auto; border-top:1px solid var(--border)"></div>
    <button onclick="closeModals()" style="position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.5); width:30px; height:30px; border-radius:50%">✕</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, onSnapshot, query, orderBy, doc, getDoc, setDoc, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBprG8pYZ1WQNh2wt0kih3P7Z3nIxhnU5k",
  authDomain: "mobify-5b3c9.firebaseapp.com",
  projectId: "mobify-5b3c9",
  storageBucket: "mobify-5b3c9.firebasestorage.app",
  messagingSenderId: "454093361079",
  appId: "1:454093361079:web:ab1e1093a91a705be3a232"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let allPosts = [];
let currentUser = null;
let currentTag = null;
let selectedBase64 = "";

// CORE LOGIC
const getHandle = (n) => `@${n.toLowerCase().replace(/\s+/g, '')}`;

function renderFeed() {
  const feed = document.getElementById("feed");
  const searchTerm = document.getElementById("searchInput").value.toLowerCase();
  
  let filtered = allPosts;
  if (currentTag) filtered = filtered.filter(p => p.content.includes(currentTag));
  if (searchTerm) filtered = filtered.filter(p => p.content.toLowerCase().includes(searchTerm) || p.username.toLowerCase().includes(searchTerm));

  feed.innerHTML = filtered.length ? "" : '<div style="padding:50px; text-align:center; color:var(--muted)">No posts found</div>';
  
  filtered.forEach(post => {
    const div = document.createElement("div");
    div.className = "post";
    div.innerHTML = `
      <div class="avatar-container">
        <img class="avatar" src="${post.userProfilePic || 'https://ui-avatars.com/api/?name='+post.username}" />
      </div>
      <div class="post-content">
        <div class="post-header">
          <span class="post-name">${post.username}</span>
          <span class="post-handle">${getHandle(post.username)}</span>
          ${post.username === '4by4' ? '<span class="badge">OWNER</span>' : ''}
        </div>
        <div class="post-body">${post.content.replace(/(#\w+)/g, '<span style="color:var(--accent)">$1</span>')}</div>
        ${post.imageURL ? `<img class="post-media" src="${post.imageURL}" />` : ''}
        <div class="post-actions">
          <button class="action-btn like">❤️ <span>${post.likes || 0}</span></button>
          <button class="action-btn">👎 <span>0</span></button>
        </div>
      </div>
    `;
    div.onclick = (e) => { if(!e.target.closest('button')) viewProfile(post.userId); };
    feed.appendChild(div);
  });
}

function updateTrends() {
  const counts = {};
  allPosts.forEach(p => {
    const tags = p.content.match(/#\w+/g) || [];
    tags.forEach(t => counts[t] = (counts[t] || 0) + 1);
  });
  
  const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]).slice(0, 5);
  const list = document.getElementById("trendingList");
  list.innerHTML = sorted.length ? "" : "No trends yet.";
  
  sorted.forEach(([tag, count]) => {
    const item = document.createElement("div");
    item.className = "trend-item";
    item.innerHTML = `<span class="trend-tag">${tag}</span><span class="trend-count">${count} posts</span>`;
    item.onclick = () => {
      document.getElementById("searchInput").value = tag;
      renderFeed();
    };
    list.appendChild(item);
  });
}

async function viewProfile(uid) {
  const snap = await getDoc(doc(db, "users", uid));
  if (!snap.exists()) return;
  const data = snap.data();
  
  document.getElementById("profName").textContent = data.name;
  document.getElementById("profHandle").textContent = getHandle(data.name);
  document.getElementById("profPfp").src = data.pfp || 'https://ui-avatars.com/api/?name='+data.name;
  document.getElementById("profStatus").textContent = data.status || "Hey there! I'm using Mobify.";
  
  const editBtn = document.getElementById("editStatusBtn");
  editBtn.classList.toggle("hidden", uid !== auth.currentUser.uid);
  
  const container = document.getElementById("userPosts");
  container.innerHTML = "";
  allPosts.filter(p => p.userId === uid).forEach(p => {
    const d = document.createElement("div");
    d.style.padding = "15px"; d.style.borderBottom = "1px solid var(--border)";
    d.textContent = p.content;
    container.appendChild(d);
  });
  
  document.getElementById("profileModal").style.display = "flex";
}

window.closeModals = () => {
  document.querySelectorAll(".modal").forEach(m => m.style.display = "none");
};

// LISTENERS
document.getElementById("searchInput").oninput = renderFeed;

document.getElementById("authForm").onsubmit = async (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  const user = document.getElementById("username").value;
  const isLogin = document.getElementById("username").classList.contains("hidden");

  try {
    if (!isLogin) {
      const res = await createUserWithEmailAndPassword(auth, email, pass);
      await setDoc(doc(db, "users", res.user.uid), { name: user, status: "Just joined Mobify!", pfp: "" });
    } else {
      await signInWithEmailAndPassword(auth, email, pass);
    }
  } catch (err) { alert(err.message); }
};

document.getElementById("toggleAuthBtn").onclick = () => {
  const u = document.getElementById("username");
  const b = document.getElementById("authSubmitBtn");
  u.classList.toggle("hidden");
  b.textContent = u.classList.contains("hidden") ? "Log In" : "Sign Up";
};

document.getElementById("logoutBtn").onclick = () => signOut(auth);
document.getElementById("navMyProfile").onclick = () => viewProfile(auth.currentUser.uid);
document.getElementById("openPostModal").onclick = () => document.getElementById("createPostModal").style.display = "flex";

document.getElementById("postImageFile").onchange = (e) => {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      selectedBase64 = ev.target.result;
      document.getElementById("imagePreview").src = selectedBase64;
      document.getElementById("imagePreviewContainer").classList.remove("hidden");
    };
    reader.readAsDataURL(file);
  }
};

document.getElementById("createPostForm").onsubmit = async (e) => {
  e.preventDefault();
  const content = document.getElementById("postContent").value;
  if(!content && !selectedBase64) return;
  
  await addDoc(collection(db, "posts"), {
    userId: auth.currentUser.uid,
    username: document.getElementById("myUsername").textContent,
    userProfilePic: document.getElementById("myPfp").src,
    content,
    imageURL: selectedBase64,
    likes: 0,
    timestamp: new Date().toISOString()
  });
  
  document.getElementById("createPostForm").reset();
  selectedBase64 = "";
  document.getElementById("imagePreviewContainer").classList.add("hidden");
  closeModals();
};

onAuthStateChanged(auth, async (user) => {
  if (user) {
    const snap = await getDoc(doc(db, "users", user.uid));
    const data = snap.data();
    document.getElementById("myUsername").textContent = data?.name || "User";
    document.getElementById("myHandle").textContent = getHandle(data?.name || "user");
    document.getElementById("myPfp").src = data?.pfp || 'https://ui-avatars.com/api/?name='+(data?.name || 'U');
    
    document.getElementById("auth-container").style.display = "none";
    document.getElementById("app-container").style.display = "grid";

    onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (s) => {
      allPosts = s.docs.map(d => ({id: d.id, ...d.data()}));
      renderFeed();
      updateTrends();
    });
  } else {
    document.getElementById("auth-container").style.display = "flex";
    document.getElementById("app-container").style.display = "none";
  }
});
</script>
</body>
</html>
