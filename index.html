<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobify Web</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    display: flex;
    height: 100vh;
    background-color: #fafafa;
}

/* Sidebar */
.sidebar {
    width: 300px;
    border-right: 3px solid black;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background: white;
}

.profile-card {
    border: 2px solid black;
    border-radius: 12px;
    padding: 15px;
    display: flex;
    gap: 10px;
    background: #f0f0f0;
}

.profile-pic {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 2px solid black;
    background: #ddd;
}

.sidebar-content {
    margin-top: 30px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.sidebar-content p {
    cursor: pointer;
}

.search-bar {
    border: 2px solid black;
    border-radius: 8px;
    padding: 10px;
}

/* Main */
.main-content {
    flex: 1;
    display: flex;
    justify-content: center;
    overflow: hidden;
}

#feed {
    width: 100%;
    max-width: 700px;
    padding: 20px;
    overflow-y: auto;
}

/* Post */
.post-card {
    border: 2px solid black;
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 20px;
    background: white;
}

.post-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
}

.mini-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid black;
}

.rank-badge {
    font-size: 12px;
    color: #666;
}

.post-img {
    width: 100%;
    margin-top: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <div>
        <div class="profile-card">
            <div class="profile-pic"></div>
            <div class="profile-info">
                <h3>Loading...</h3>
                <p>...</p>
            </div>
        </div>

        <div class="sidebar-content">
            <p>🏠 Home</p>
            <p>🔥 Trending</p>
            <p>👤 Profile</p>
            <p>⚙️ Settings</p>
        </div>
    </div>

    <input id="searchInput" class="search-bar" placeholder="Search posts...">
</div>

<!-- Main -->
<div class="main-content">
    <div id="feed"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  getDocs,
  query,
  orderBy,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* Firebase config */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "mobify-5b3c9.firebaseapp.com",
  projectId: "mobify-5b3c9",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

/* Render Post */
function renderPost(data) {
  return `
    <div class="post-card">
      <div class="post-header">
        <img src="${data.userProfilePic || ''}" class="mini-avatar">
        <div>
          <strong>${data.username}</strong>
          <div class="rank-badge">${data.rank || "Member"}</div>
        </div>
      </div>
      <p>${data.content || ""}</p>
      ${data.imageURL ? `<img src="${data.imageURL}" class="post-img">` : ""}
    </div>
  `;
}

/* Load Posts */
async function loadPosts() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "Loading...";

  const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
  const snapshot = await getDocs(q);

  feed.innerHTML = "";

  snapshot.forEach(doc => {
    feed.innerHTML += renderPost(doc.data());
  });
}

/* Load User */
async function loadUserData(user) {
  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    const data = snap.data();
    document.querySelector(".profile-info h3").textContent = data.name;
    document.querySelector(".profile-info p").textContent = data.rank || "Member";
  }
}

/* Search */
document.addEventListener("input", async (e) => {
  if (e.target.id !== "searchInput") return;

  const value = e.target.value.toLowerCase();
  const feed = document.getElementById("feed");

  const snapshot = await getDocs(collection(db, "posts"));

  feed.innerHTML = "";

  snapshot.forEach(doc => {
    const data = doc.data();
    if (
      data.content?.toLowerCase().includes(value) ||
      data.username?.toLowerCase().includes(value)
    ) {
      feed.innerHTML += renderPost(data);
    }
  });
});

/* Auth */
onAuthStateChanged(auth, (user) => {
  if (!user) {
    document.body.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;">
        <h1>Mobify</h1>
        <button id="loginBtn">Sign in with Google</button>
      </div>
    `;

    document.getElementById("loginBtn").onclick = () => {
      signInWithPopup(auth, provider).then(() => location.reload());
    };
  } else {
    loadUserData(user);
    loadPosts();
  }
});
</script>

</body>
</html>
