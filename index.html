<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobify</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: system-ui;
  display: flex;
  height: 100vh;
  background: #fafafa;
}

/* Sidebar */
.sidebar {
  width: 260px;
  border-right: 2px solid black;
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  background: white;
}

.profile-card {
  display:flex;
  gap:10px;
  padding:10px;
  border:2px solid black;
  border-radius:10px;
}

.profile-pic {
  width:50px;
  height:50px;
  border-radius:50%;
  border:2px solid black;
}

.sidebar-content {
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* Main */
.main {
  flex:1;
  display:flex;
  justify-content:center;
}

#feed {
  width:100%;
  max-width:600px;
  padding:20px;
  overflow-y:auto;
}

/* Post */
.post {
  border:2px solid black;
  border-radius:12px;
  padding:15px;
  margin-bottom:20px;
  background:white;
}

.post-header {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}

.post img {
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

/* Actions */
.actions {
  display:flex;
  gap:15px;
  margin-top:10px;
  cursor:pointer;
}

/* Modal */
.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-box {
  background:white;
  padding:20px;
  border-radius:10px;
  width:300px;
}

/* FAB */
.fab {
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:black;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <div>
    <div class="profile-card">
      <img id="pfp" class="profile-pic">
      <div>
        <h3 id="username">...</h3>
        <p id="rank">Member</p>
      </div>
    </div>

    <div class="sidebar-content">
      <p>🏠 Home</p>
      <p>🔥 Trending</p>
      <p>👤 Profile</p>
    </div>
  </div>

  <input id="search" placeholder="Search..." />
</div>

<div class="main">
  <div id="feed"></div>
</div>

<div class="fab" id="openModal">+</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <textarea id="postText" placeholder="What's happening?"></textarea>
    <input id="imageURL" placeholder="Image URL (optional)">
    <button id="postBtn">Post</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  updateDoc,
  doc,
  arrayUnion,
  arrayRemove,
  serverTimestamp,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = { /* YOUR CONFIG */ };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;

async function loadUserProfile(user) {
  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    const data = snap.data();

    username.textContent = data.name;
    rank.textContent = data.rank;
    pfp.src = data.pfp || "https://via.placeholder.com/50";
  }
}

/* Render */
function render(post, id) {
  const liked = post.likes?.includes(currentUser.uid);
  const disliked = post.dislikes?.includes(currentUser.uid);

  return `
  <div class="post">
    <div class="post-header">
      <img src="${post.userProfilePic}" width="40">
      <strong>${post.username}</strong>
    </div>
    <p>${post.content}</p>
    ${post.imageURL ? `<img src="${post.imageURL}">` : ""}
    <div class="actions">
      <span onclick="like('${id}')">❤️ ${post.likes?.length || 0}</span>
      <span onclick="dislike('${id}')">👎 ${post.dislikes?.length || 0}</span>
    </div>
  </div>`;
}

/* Realtime Feed */
function startFeed() {
  const q = collection(db, "posts");

  onSnapshot(q, (snap) => {
    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    snap.docs.reverse().forEach(docSnap => {
      feed.innerHTML += render(docSnap.data(), docSnap.id);
    });
  });
}

/* Like */
window.like = async (id) => {
  const ref = doc(db, "posts", id);

  await updateDoc(ref, {
    likes: arrayUnion(currentUser.uid),
    dislikes: arrayRemove(currentUser.uid)
  });
};

/* Dislike */
window.dislike = async (id) => {
  const ref = doc(db, "posts", id);

  await updateDoc(ref, {
    dislikes: arrayUnion(currentUser.uid),
    likes: arrayRemove(currentUser.uid)
  });
};

/* Create Post */
document.getElementById("postBtn").onclick = async () => {
  await addDoc(collection(db, "posts"), {
    content: postText.value,
    imageURL: imageURL.value,
    const userDoc = await getDoc(doc(db, "users", currentUser.uid));
const userData = userDoc.data();

await addDoc(collection(db, "posts"), {
  content: postText.value,
  imageURL: imageURL.value,
  username: userData.name,
  userProfilePic: userData.pfp || "",
  userID: currentUser.uid,
  likes: [],
  dislikes: [],
  timestamp: serverTimestamp()
});
    userID: currentUser.uid,
    likes: [],
    dislikes: [],
    timestamp: serverTimestamp()
  });

  modal.style.display = "none";
};

/* Modal */
openModal.onclick = () => modal.style.display = "flex";

/* Search */
search.oninput = (e) => {
  const val = e.target.value.toLowerCase();
  document.querySelectorAll(".post").forEach(p => {
    p.style.display = p.innerText.toLowerCase().includes(val) ? "" : "none";
  });
};

let currentUser;

/* AUTH UI */
function showAuth() {
  document.body.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;">
      <h1>Mobify</h1>

      <input id="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />

      <button id="loginBtn">Login</button>
      <button id="signupBtn">Sign Up</button>
    </div>
  `;

  document.getElementById("loginBtn").onclick = login;
  document.getElementById("signupBtn").onclick = signup;
}

/* SIGNUP */
async function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    const user = cred.user;

    // create user doc
    await setDoc(doc(db, "users", user.uid), {
      name: email.split("@")[0],
      email: email,
      rank: "Member",
      pfp: ""
    });

  } catch (err) {
    alert(err.message);
  }
}

/* LOGIN */
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (err) {
    alert(err.message);
  }
}

/* AUTH STATE */
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    showAuth();
  } else {
    currentUser = user;

    await loadUserProfile(user);

    startFeed();
  }
});
</script>

</body>
</html>
