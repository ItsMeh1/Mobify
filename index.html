<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobify</title>
<style>
  :root {
    --bg: #000000;
    --panel-bg: #16181c;
    --border: #2f3336;
    --text-main: #e7e9ea;
    --text-muted: #71767b;
    --accent: #1d9bf0;
    --accent-hover: #1a8cd8;
    --danger: #f4212e;
  }

  * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

  body { background: var(--bg); color: var(--text-main); display: flex; justify-content: center; height: 100vh; overflow: hidden; }

  /* --- AUTH SCREEN --- */
  #auth-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100%; background: var(--bg); z-index: 100; }
  .auth-box { background: var(--panel-bg); padding: 40px; border-radius: 16px; border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; }
  .auth-box h1 { font-size: 32px; margin-bottom: 20px; letter-spacing: -1px; }
  .auth-box input[type="text"], .auth-box input[type="email"], .auth-box input[type="password"] {
    width: 100%; padding: 15px; margin-bottom: 15px; background: var(--bg); color: var(--text-main); border: 1px solid var(--border); border-radius: 8px; font-size: 16px;
  }
  .file-label { display: block; margin-bottom: 15px; color: var(--accent); cursor: pointer; font-size: 14px; }

  .btn-primary { background: var(--accent); color: white; border: none; font-weight: bold; padding: 15px; border-radius: 30px; width: 100%; font-size: 16px; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); font-weight: bold; padding: 15px; border-radius: 30px; width: 100%; font-size: 16px; cursor: pointer; transition: 0.2s; }

  /* --- MAIN APP --- */
  #app-container { display: none; width: 100%; max-width: 1200px; height: 100vh; }
  .sidebar { width: 275px; border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; justify-content: space-between; height: 100%; }
  .logo { font-size: 28px; font-weight: 800; padding: 10px; margin-bottom: 20px; letter-spacing: -1px;}
  .nav-item { font-size: 20px; padding: 12px 20px; border-radius: 30px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 15px; font-weight: 500; margin-bottom: 5px; }
  .nav-item:hover { background: rgba(231, 233, 234, 0.1); }
  .search-bar { width: 100%; padding: 12px 20px; border-radius: 30px; border: none; background: var(--panel-bg); color: var(--text-main); margin-bottom: 20px; border: 1px solid transparent; outline: none; }
  .profile-card { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 30px; cursor: pointer; transition: 0.2s; }
  .profile-pic { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: var(--border); }
  
  .main { flex: 1; border-right: 1px solid var(--border); overflow-y: auto; scrollbar-width: none; }
  .main::-webkit-scrollbar { display: none; }
  .header { backdrop-filter: blur(12px); background: rgba(0, 0, 0, 0.65); position: sticky; top: 0; padding: 15px 20px; z-index: 10; border-bottom: 1px solid var(--border); font-size: 20px; font-weight: 700; }

  .post { padding: 20px; border-bottom: 1px solid var(--border); display: flex; gap: 15px; }
  .post-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
  .post-body { flex: 1; }
  .post-header { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
  .post-text { font-size: 15px; line-height: 1.5; margin-bottom: 10px; white-space: pre-wrap; }
  .post-image { width: 100%; border-radius: 16px; margin-top: 10px; border: 1px solid var(--border); max-height: 500px; object-fit: cover;}

  .actions { display: flex; gap: 40px; margin-top: 15px; color: var(--text-muted); }
  .action-btn { display: flex; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s; font-size: 14px;}

  .right-sidebar { width: 350px; padding: 20px; }
  .trending-box { background: var(--panel-bg); border-radius: 16px; padding: 15px; }
  .trend-item { margin-bottom: 15px; }
  .trend-item p { color: var(--text-muted); font-size: 13px; }

  .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background: var(--accent); color: white; display: none; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; z-index: 50; }
  .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(91, 112, 131, 0.4); display: none; align-items: flex-start; justify-content: center; z-index: 200; padding-top: 50px; }
  .modal-box { background: var(--bg); padding: 20px; border-radius: 16px; width: 100%; max-width: 600px; }
  .modal textarea { width: 100%; height: 100px; background: transparent; color: var(--text-main); border: none; font-size: 20px; outline: none; resize: none; }
  
  #imagePreview { max-width: 100px; border-radius: 8px; display: none; margin-bottom: 10px; }
</style>
</head>

<body>

<div id="auth-container">
  <div class="auth-box">
    <h1>Mobify</h1>
    <input id="email" placeholder="Email address" type="email" />
    <input id="password" type="password" placeholder="Password" />
    <label class="file-label">
      📸 Upload Profile Picture
      <input type="file" id="authPfpInput" hidden accept="image/*">
    </label>
    <button id="loginBtn" class="btn-primary">Log in</button>
    <button id="signupBtn" class="btn-outline">Create account</button>
  </div>
</div>

<div id="app-container">
  <div class="sidebar">
    <div>
      <div class="logo">Mobify</div>
      <div class="nav-item">🏠 Home</div>
      <div class="nav-item">🔥 Trending</div>
      <div class="nav-item" id="logoutBtn">🚪 Logout</div>
    </div>
    <div class="profile-card">
      <img id="pfp" class="profile-pic" src="">
      <div class="user-info">
        <h3 id="username">User</h3>
        <p id="rank">@member</p>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="header">Home</div>
    <div id="feed"></div>
  </div>

  <div class="right-sidebar">
    <input id="search" class="search-bar" placeholder="Search Mobify..." />
    <div class="trending-box">
      <h2>What's happening</h2>
      <div id="trending-list"></div>
    </div>
  </div>
</div>

<div class="fab" id="openModal">+</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div style="display:flex; justify-content: space-between; margin-bottom: 10px;">
      <div id="closeModal" style="cursor:pointer">✕</div>
      <button id="postBtn" class="btn-primary" style="width:auto; padding: 5px 20px;">Post</button>
    </div>
    <textarea id="postText" placeholder="What's happening?"></textarea>
    <img id="imagePreview">
    <label class="file-label">
      🖼️ Add Image
      <input type="file" id="postImageInput" hidden accept="image/*">
    </label>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, arrayUnion, arrayRemove, serverTimestamp, setDoc, getDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBprG8pYZ1WQNh2wt0kih3P7Z3nIxhnU5k",
  authDomain: "mobify-5b3c9.firebaseapp.com",
  projectId: "mobify-5b3c9",
  storageBucket: "mobify-5b3c9.firebasestorage.app",
  messagingSenderId: "454093361079",
  appId: "1:454093361079:web:ab1e1093a91a705be3a232"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let currentUser = null;
let currentPostBase64 = "";

// Helper: Convert File to Base64 (with simple compression)
const toBase64 = file => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
});

async function loadUserProfile(user) {
  const snap = await getDoc(doc(db, "users", user.uid));
  let name = user.email.split('@')[0];
  let pfp = `https://ui-avatars.com/api/?name=${name}`;
  
  if (snap.exists()) {
    name = snap.data().name || name;
    pfp = snap.data().pfp || pfp;
  }
  document.getElementById("username").textContent = name;
  document.getElementById("pfp").src = pfp;
  document.getElementById("rank").textContent = "@" + name.toLowerCase();
}

function updateTrending(counts) {
  const list = document.getElementById("trending-list");
  list.innerHTML = "";
  Object.keys(counts).sort((a,b) => counts[b] - counts[a]).slice(0,5).forEach(tag => {
    list.innerHTML += `<div class="trend-item"><p>Trending</p><strong>${tag}</strong><p>${counts[tag]} posts</p></div>`;
  });
}

function render(post, id) {
  return `
  <div class="post">
    <img src="${post.userProfilePic || ''}" class="post-avatar">
    <div class="post-body">
      <div class="post-header"><strong>${post.username}</strong></div>
      <div class="post-text">${post.content}</div>
      ${post.imageURL ? `<img src="${post.imageURL}" class="post-image">` : ""}
      <div class="actions">
        <div class="action-btn" onclick="like('${id}')">❤️ ${post.likes?.length || 0}</div>
        <div class="action-btn" onclick="dislike('${id}')">👎 ${post.dislikes?.length || 0}</div>
      </div>
    </div>
  </div>`;
}

function startFeed() {
  const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
  onSnapshot(q, (snap) => {
    const feed = document.getElementById("feed");
    const counts = {};
    feed.innerHTML = "";
    snap.forEach(docSnap => {
      const data = docSnap.data();
      feed.innerHTML += render(data, docSnap.id);
      (data.content.match(/#[\w]+/g) || []).forEach(tag => counts[tag] = (counts[tag] || 0) + 1);
    });
    updateTrending(counts);
  });
}

// Global Actions
window.like = id => updateDoc(doc(db, "posts", id), { likes: arrayUnion(currentUser.uid), dislikes: arrayRemove(currentUser.uid) });
window.dislike = id => updateDoc(doc(db, "posts", id), { dislikes: arrayUnion(currentUser.uid), likes: arrayRemove(currentUser.uid) });

// Post Logic
document.getElementById("postImageInput").onchange = async (e) => {
  currentPostBase64 = await toBase64(e.target.files[0]);
  document.getElementById("imagePreview").src = currentPostBase64;
  document.getElementById("imagePreview").style.display = "block";
};

document.getElementById("postBtn").onclick = async () => {
  const text = document.getElementById("postText").value;
  if(!text && !currentPostBase64) return;
  const userSnap = await getDoc(doc(db, "users", currentUser.uid));
  const userData = userSnap.data();
  
  await addDoc(collection(db, "posts"), {
    content: text,
    imageURL: currentPostBase64,
    username: userData.name,
    userProfilePic: userData.pfp,
    timestamp: serverTimestamp(),
    likes: [], dislikes: []
  });
  
  document.getElementById("modal").style.display = "none";
  document.getElementById("postText").value = "";
  currentPostBase64 = "";
  document.getElementById("imagePreview").style.display = "none";
};

// Auth
document.getElementById("signupBtn").onclick = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  const file = document.getElementById("authPfpInput").files[0];
  let pfpBase64 = "";
  if(file) pfpBase64 = await toBase64(file);

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await setDoc(doc(db, "users", cred.user.uid), {
      name: email.split("@")[0],
      pfp: pfpBase64,
      email: email
    });
  } catch (e) { alert(e.message); }
};

document.getElementById("loginBtn").onclick = () => signInWithEmailAndPassword(auth, email.value, password.value);
document.getElementById("logoutBtn").onclick = () => signOut(auth);
document.getElementById("openModal").onclick = () => document.getElementById("modal").style.display = "flex";
document.getElementById("closeModal").onclick = () => document.getElementById("modal").style.display = "none";

onAuthStateChanged(auth, u => {
  currentUser = u;
  document.getElementById("auth-container").style.display = u ? "none" : "flex";
  document.getElementById("app-container").style.display = u ? "flex" : "none";
  document.getElementById("openModal").style.display = u ? "flex" : "none";
  if(u) { loadUserProfile(u); startFeed(); }
});
</script>
</body>
</html>
