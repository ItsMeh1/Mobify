<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobify | v3.5</title>
<style>
  :root {
    --bg: #000000;
    --panel-bg: #16181c;
    --border: #2f3336;
    --text-main: #e7e9ea;
    --text-muted: #71767b;
    --accent: #1d9bf0;
    --accent-hover: #1a8cd8;
  }

  * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
  body { background: var(--bg); color: var(--text-main); display: flex; justify-content: center; height: 100vh; overflow: hidden; }

  #app-container { display: none; width: 100%; max-width: 1200px; height: 100vh; }
  .sidebar { width: 275px; border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
  .main { flex: 1; border-right: 1px solid var(--border); overflow-y: auto; scrollbar-width: none; }
  .right-sidebar { width: 350px; padding: 20px; }

  /* --- POSTS (Feed) --- */
  .post { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; cursor: pointer; transition: 0.1s; }
  .post:hover { background: rgba(255, 255, 255, 0.02); }
  .post-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
  .post-image { width: 100%; border-radius: 16px; margin-top: 12px; border: 1px solid var(--border); display: block; }
  .rank-badge { background: #202327; color: var(--accent); font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: bold; margin-left: 8px; }

  /* --- MODALS (Neater & Fixed Scaling) --- */
  .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(91, 112, 131, 0.4); display: none; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(5px); }
  .modal-box { 
    background: var(--bg); width: 100%; max-width: 600px; max-height: 85vh; 
    border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; 
    border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.7);
  }
  .modal-body { flex: 1; overflow-y: auto; padding: 25px; }

  /* FIX: Constraints for the Profile/Detail Avatars */
  #profPfp, .detail-avatar { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }

  .nav-item { font-size: 20px; padding: 12px 20px; border-radius: 30px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 15px; }
  .nav-item:hover { background: rgba(231, 233, 234, 0.1); }
  
  .search-bar { width: 100%; padding: 12px 20px; border-radius: 30px; background: var(--panel-bg); border: 1px solid transparent; color: white; outline: none; transition: 0.2s; }
  .search-bar:focus { border-color: var(--accent); background: var(--bg); }

  .fab { position: fixed; bottom: 30px; right: 30px; width: 56px; height: 56px; border-radius: 50%; background: var(--accent); color: white; display: none; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; z-index: 100; }
</style>
</head>
<body>

<div id="auth-container" style="display: flex; align-items: center; justify-content: center; height: 100vh; width: 100%;">
  <div style="background: var(--panel-bg); padding: 40px; border-radius: 20px; width: 350px; text-align: center;">
    <h1 style="margin-bottom:20px;">Mobify</h1>
    <input id="email" type="email" placeholder="Email" style="width:100%; padding:12px; margin-bottom:10px; background:#000; border:1px solid var(--border); color:white; border-radius:8px;">
    <input id="password" type="password" placeholder="Password" style="width:100%; padding:12px; margin-bottom:15px; background:#000; border:1px solid var(--border); color:white; border-radius:8px;">
    <button id="loginBtn" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:30px; font-weight:bold; cursor:pointer;">Log in</button>
  </div>
</div>

<div id="app-container">
  <div class="sidebar">
    <div style="font-size:28px; font-weight:800; margin-bottom:20px;">Mobify</div>
    <div class="nav-item" onclick="location.reload()">🏠 Home</div>
    <div class="nav-item" id="openProfile">👤 Profile</div>
    <div class="nav-item" id="logoutBtn">🚪 Logout</div>
    
    <div class="profile-card" style="margin-top:auto; display:flex; align-items:center; gap:10px; padding:10px;">
      <img id="myPfp" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
      <div>
        <strong id="myUsername">User</strong>
        <div id="myHandle" style="color:var(--text-muted); font-size:12px;">@handle</div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="header" style="padding:15px; border-bottom:1px solid var(--border); font-weight:bold; font-size:20px; backdrop-filter:blur(10px); position:sticky; top:0; background:rgba(0,0,0,0.7);">Home</div>
    <div id="feed"></div>
  </div>

  <div class="right-sidebar">
    <input id="search" class="search-bar" placeholder="Search users, @tags, or posts..." />
    <div id="results-count" style="margin-top:10px; color:var(--text-muted); font-size:13px; display:none;"></div>
  </div>
</div>

<div class="fab" id="openPostModal">+</div>

<div class="modal" id="profileModal">
  <div class="modal-box">
    <div style="padding:15px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
        <strong>Profile</strong>
        <span class="close-modal" style="cursor:pointer">✕</span>
    </div>
    <div class="modal-body">
        <div style="display:flex; gap:20px; align-items:center;">
            <img id="profPfp" src="">
            <div>
                <h2 id="profName">Name</h2>
                <p id="profHandle" style="color:var(--accent); font-weight:bold;">@handle</p>
                <div id="profRank" class="rank-badge" style="display:inline-block; margin-top:5px; margin-left:0;">Rank</div>
            </div>
        </div>
        <div style="margin-top:15px;">
            <p id="profStatus" style="font-style:italic; color:var(--text-muted);"></p>
            <input id="statusInput" placeholder="Set a new status..." style="width:100%; background:#111; border:1px solid var(--border); color:white; padding:10px; border-radius:8px; margin-top:10px; display:none;">
        </div>
        <hr style="border:none; border-top:1px solid var(--border); margin:20px 0;">
        <h3>Posts</h3>
        <div id="userPosts" style="margin-top:15px;"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, onSnapshot, query, orderBy, where, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBprG8pYZ1WQNh2wt0kih3P7Z3nIxhnU5k",
  authDomain: "mobify-5b3c9.firebaseapp.com",
  projectId: "mobify-5b3c9",
  storageBucket: "mobify-5b3c9.firebasestorage.app",
  messagingSenderId: "454093361079",
  appId: "1:454093361079:web:ab1e1093a91a705be3a232"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let allPosts = [];
let currentUser = null;

// --- RENDER POST HELPER ---
function getPostHTML(p) {
    const handle = `@${p.username.toLowerCase().replace(/\s/g, '')}`;
    return `
    <div class="post" onclick="viewProfile('${p.userId}')">
      <img src="${p.userProfilePic || 'https://via.placeholder.com/50'}" class="post-avatar">
      <div style="flex:1">
        <div style="display:flex; align-items:center;">
            <strong>${p.username}</strong>
            <span style="color:var(--text-muted); margin-left:8px;">${handle}</span>
            <span class="rank-badge">${p.rank || 'Member'}</span>
        </div>
        <div style="margin-top:5px; line-height:1.4;">${p.content}</div>
        ${p.imageURL ? `<img src="${p.imageURL}" class="post-image">` : ""}
      </div>
    </div>`;
}

// --- FUZZY SEARCH ENGINE ---
document.getElementById("search").oninput = (e) => {
    const val = e.target.value.toLowerCase().trim();
    const feed = document.getElementById("feed");
    const countLabel = document.getElementById("results-count");
    
    if(!val) {
        countLabel.style.display = "none";
        renderFeed(allPosts);
        return;
    }

    const filtered = allPosts.filter(p => {
        const handle = `@${p.username.toLowerCase().replace(/\s/g, '')}`;
        const name = p.username.toLowerCase();
        const content = p.content.toLowerCase();
        // Check if query is in name, handle, or post text
        return name.includes(val) || handle.includes(val) || content.includes(val);
    });

    countLabel.innerText = `Found ${filtered.length} results for "${val}"`;
    countLabel.style.display = "block";
    renderFeed(filtered);
};

function renderFeed(posts) {
    const feed = document.getElementById("feed");
    feed.innerHTML = "";
    posts.forEach(p => feed.innerHTML += getPostHTML(p));
}

// --- PROFILE LOGIC ---
window.viewProfile = async (uid) => {
    const uDoc = await getDoc(doc(db, "users", uid));
    if(!uDoc.exists()) return;
    const data = uDoc.data();
    
    document.getElementById("profName").textContent = data.name;
    document.getElementById("profHandle").textContent = "@" + data.name.toLowerCase();
    document.getElementById("profPfp").src = data.pfp || "";
    document.getElementById("profRank").textContent = data.rank || "Member";
    document.getElementById("profStatus").textContent = data.status || "No status set";

    const sInput = document.getElementById("statusInput");
    if(currentUser.uid === uid) {
        sInput.style.display = "block";
        sInput.onkeydown = async (e) => {
            if(e.key === 'Enter') {
                await updateDoc(doc(db, "users", uid), { status: sInput.value });
                document.getElementById("profStatus").textContent = sInput.value;
                sInput.value = "";
            }
        };
    } else { sInput.style.display = "none"; }

    const uPosts = allPosts.filter(p => p.userId === uid);
    const feed = document.getElementById("userPosts");
    feed.innerHTML = uPosts.length ? "" : "<p style='color:var(--text-muted)'>No posts yet.</p>";
    uPosts.forEach(p => feed.innerHTML += getPostHTML(p));

    document.getElementById("profileModal").style.display = "flex";
};

// --- AUTH & INITIALIZATION ---
onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    document.getElementById("auth-container").style.display = user ? "none" : "flex";
    document.getElementById("app-container").style.display = user ? "flex" : "none";
    document.getElementById("openPostModal").style.display = user ? "flex" : "none";
    if(user) {
        const d = await getDoc(doc(db, "users", user.uid));
        const data = d.data();
        document.getElementById("myUsername").innerText = data.name;
        document.getElementById("myHandle").innerText = "@" + data.name.toLowerCase();
        document.getElementById("myPfp").src = data.pfp || "";
        
        // Listen to Global Feed
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            allPosts = snap.docs.map(d => ({id: d.id, ...d.data()}));
            // Only re-render if not searching
            if(!document.getElementById("search").value) renderFeed(allPosts);
        });
    }
});

document.getElementById("loginBtn").onclick = () => signInWithEmailAndPassword(auth, email.value, password.value);
document.getElementById("logoutBtn").onclick = () => signOut(auth);
document.getElementById("openProfile").onclick = () => viewProfile(currentUser.uid);
document.querySelectorAll(".close-modal").forEach(b => b.onclick = () => b.closest(".modal").style.display = "none");
</script>
</body>
</html>
