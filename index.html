<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobify</title>
<style>
  :root {
    --bg: #000000;
    --panel-bg: #16181c;
    --border: #2f3336;
    --text-main: #e7e9ea;
    --text-muted: #71767b;
    --accent: #1d9bf0;
    --accent-hover: #1a8cd8;
    --danger: #f4212e;
  }

  * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { background: var(--bg); color: var(--text-main); display: flex; justify-content: center; height: 100vh; overflow: hidden; }

  /* --- AUTH SCREEN --- */
  #auth-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100%; z-index: 100; }
  .auth-box { background: var(--panel-bg); padding: 40px; border-radius: 16px; border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; }
  .auth-box input { width: 100%; padding: 15px; margin-bottom: 15px; background: var(--bg); color: var(--text-main); border: 1px solid var(--border); border-radius: 8px; }

  /* --- MAIN APP --- */
  #app-container { display: none; width: 100%; max-width: 1200px; height: 100vh; }
  
  /* Sidebar */
  .sidebar { width: 275px; border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; justify-content: space-between; }
  .logo { font-size: 28px; font-weight: 800; padding: 10px; margin-bottom: 20px; letter-spacing: -1px; }
  .nav-item { font-size: 20px; padding: 12px 20px; border-radius: 30px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 15px; font-weight: 500; }
  .nav-item:hover { background: rgba(231, 233, 234, 0.1); }

  .profile-card { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 30px; margin-top: auto; }
  .profile-pic { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: var(--border); }

  /* Main Feed */
  .main { flex: 1; border-right: 1px solid var(--border); overflow-y: auto; scrollbar-width: none; }
  .header { backdrop-filter: blur(12px); background: rgba(0, 0, 0, 0.65); position: sticky; top: 0; padding: 15px 20px; z-index: 10; border-bottom: 1px solid var(--border); font-size: 20px; font-weight: 700; }

  /* Post Style */
  .post { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; cursor: pointer; transition: 0.2s; }
  .post:hover { background: rgba(255, 255, 255, 0.03); }
  .post-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
  .post-body { flex: 1; }
  .rank-badge { background: var(--border); color: var(--accent); font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 5px; }

  /* Right Sidebar */
  .right-sidebar { width: 350px; padding: 20px; }
  .search-bar { width: 100%; padding: 12px 20px; border-radius: 30px; border: none; background: var(--panel-bg); color: var(--text-main); margin-bottom: 20px; outline: none; }
  .trending-box { background: var(--panel-bg); border-radius: 16px; padding: 15px; }

  /* MODALS & SCROLLING */
  .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(91, 112, 131, 0.4); display: none; align-items: center; justify-content: center; z-index: 200; }
  .modal-box { background: var(--bg); width: 100%; max-width: 600px; max-height: 90vh; border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border); }
  .modal-body { flex: 1; overflow-y: auto; padding: 20px; }
  
  .comment-input-area { padding: 15px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
  .btn-primary { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; }

  .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background: var(--accent); color: white; display: none; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; box-shadow: 0 4px 15px rgba(29, 155, 240, 0.3); }
</style>
</head>
<body>

<div id="auth-container">
  <div class="auth-box">
    <h1>Mobify</h1>
    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />
    <input type="file" id="authPfpInput" hidden accept="image/*">
    <label for="authPfpInput" style="color: var(--accent); cursor: pointer; display: block; margin-bottom: 15px;">📸 Upload Profile Picture</label>
    <button id="loginBtn" class="btn-primary" style="width: 100%; margin-bottom: 10px;">Log in</button>
    <button id="signupBtn" class="btn-primary" style="width: 100%; background: transparent; border: 1px solid var(--accent); color: var(--accent);">Create account</button>
  </div>
</div>

<div id="app-container">
  <div class="sidebar">
    <div>
      <div class="logo">Mobify</div>
      <div class="nav-item">🏠 Home</div>
      <div class="nav-item">🔥 Trending</div>
      <div class="nav-item" id="logoutBtn">🚪 Logout</div>
    </div>
    <div class="profile-card">
      <img id="pfp" class="profile-pic">
      <div class="user-info">
        <h3 id="username">User</h3>
        <p id="rank" style="color: var(--text-muted); font-size: 13px;">@member</p>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="header">Home</div>
    <div id="feed"></div>
  </div>

  <div class="right-sidebar">
    <input id="search" class="search-bar" placeholder="Search people or posts..." />
    <div class="trending-box">
      <h3>What's happening</h3>
      <div id="trending-list" style="margin-top: 15px;"></div>
    </div>
  </div>
</div>

<div class="fab" id="openModal">+</div>

<div class="modal" id="postModal">
  <div class="modal-box" style="padding: 20px;">
    <textarea id="postText" placeholder="What's happening?" style="width:100%; height:150px; background:transparent; color:white; border:none; font-size:20px; outline:none; resize:none;"></textarea>
    <input type="file" id="postImgInput" hidden accept="image/*">
    <label for="postImgInput" style="color:var(--accent); cursor:pointer;">🖼️ Add Image</label>
    <button id="submitPost" class="btn-primary" style="float:right;">Post</button>
  </div>
</div>

<div class="modal" id="detailModal">
  <div class="modal-box">
    <div style="padding: 15px 20px; border-bottom: 1px solid var(--border); display:flex; justify-content:space-between;">
      <strong>Post</strong>
      <span id="closeDetail" style="cursor:pointer">✕</span>
    </div>
    <div class="modal-body">
      <div id="detailContent"></div>
      <div id="commentsList" style="margin-top: 20px;"></div>
    </div>
    <div class="comment-input-area">
      <input id="commentText" type="text" placeholder="Post your reply" style="flex:1; background:transparent; border:none; color:white; outline:none;">
      <button id="submitComment" class="btn-primary">Reply</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBprG8pYZ1WQNh2wt0kih3P7Z3nIxhnU5k",
  authDomain: "mobify-5b3c9.firebaseapp.com",
  projectId: "mobify-5b3c9",
  storageBucket: "mobify-5b3c9.firebasestorage.app",
  messagingSenderId: "454093361079",
  appId: "1:454093361079:web:ab1e1093a91a705be3a232"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let allPosts = [];
let activePostId = null;
let postImageBase64 = "";

const toBase64 = file => new Promise((r, j) => {
  const reader = new FileReader();
  reader.readAsDataURL(file);
  reader.onload = () => r(reader.result);
  reader.onerror = j;
});

// --- CORE LOGIC ---
function startFeed() {
  const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
  onSnapshot(q, (snap) => {
    allPosts = snap.docs.map(d => ({id: d.id, ...d.data()}));
    const feed = document.getElementById("feed");
    const trending = {};
    feed.innerHTML = "";
    
    allPosts.forEach(p => {
      feed.innerHTML += `
        <div class="post" onclick="openDetail('${p.id}')">
          <img src="${p.userProfilePic || ''}" class="post-avatar">
          <div class="post-body">
            <strong>${p.username}</strong><span class="rank-badge">${p.rank || 'Member'}</span>
            <div style="margin-top:5px;">${p.content}</div>
            ${p.imageURL ? `<img src="${p.imageURL}" style="width:100%; border-radius:16px; margin-top:10px; border:1px solid var(--border);">` : ""}
          </div>
        </div>`;
      (p.content.match(/#[\w]+/g) || []).forEach(tag => trending[tag] = (trending[tag] || 0) + 1);
    });

    const tList = document.getElementById("trending-list");
    tList.innerHTML = "";
    Object.keys(trending).sort((a,b) => trending[b]-trending[a]).slice(0,5).forEach(t => {
      tList.innerHTML += `<div style="margin-bottom:15px;"><strong>${t}</strong><p style="color:var(--text-muted); font-size:13px;">${trending[t]} posts</p></div>`;
    });
  });
}

window.openDetail = (id) => {
  activePostId = id;
  const post = allPosts.find(p => p.id === id);
  document.getElementById("detailContent").innerHTML = `
    <div style="display:flex; gap:12px; margin-bottom:15px;">
      <img src="${post.userProfilePic}" style="width:48px; height:48px; border-radius:50%;">
      <strong>${post.username}</strong>
    </div>
    <p style="font-size:20px;">${post.content}</p>
    ${post.imageURL ? `<img src="${post.imageURL}" style="width:100%; border-radius:12px; margin-top:15px;">` : ""}
  `;

  onSnapshot(query(collection(db, "posts", id, "comments"), orderBy("timestamp", "asc")), (snap) => {
    const list = document.getElementById("commentsList");
    list.innerHTML = "";
    snap.forEach(d => {
      const c = d.data();
      list.innerHTML += `<div style="display:flex; gap:10px; margin-bottom:15px;"><img src="${c.pfp}" style="width:32px; height:32px; border-radius:50%;"><div><strong>${c.username}</strong><div>${c.text}</div></div></div>`;
    });
  });
  document.getElementById("detailModal").style.display = "flex";
};

// --- EVENTS ---
document.getElementById("signupBtn").onclick = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  const pfpFile = document.getElementById("authPfpInput").files[0];
  const pfpBase64 = pfpFile ? await toBase64(pfpFile) : "";
  
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await setDoc(doc(db, "users", cred.user.uid), { name: email.split("@")[0], pfp: pfpBase64, rank: "Member" });
  } catch (e) { alert(e.message); }
};

document.getElementById("loginBtn").onclick = () => signInWithEmailAndPassword(auth, email.value, password.value);
document.getElementById("logoutBtn").onclick = () => signOut(auth);
document.getElementById("openModal").onclick = () => document.getElementById("postModal").style.display = "flex";
document.getElementById("closeDetail").onclick = () => document.getElementById("detailModal").style.display = "none";

document.getElementById("postImgInput").onchange = async (e) => postImageBase64 = await toBase64(e.target.files[0]);

document.getElementById("submitPost").onclick = async () => {
  const text = document.getElementById("postText").value;
  const userDoc = await getDoc(doc(db, "users", currentUser.uid));
  const userData = userDoc.data();
  await addDoc(collection(db, "posts"), {
    content: text, imageURL: postImageBase64, username: userData.name, userProfilePic: userData.pfp, rank: userData.rank, timestamp: serverTimestamp()
  });
  document.getElementById("postModal").style.display = "none";
  document.getElementById("postText").value = ""; postImageBase64 = "";
};

document.getElementById("submitComment").onclick = async () => {
  const text = document.getElementById("commentText").value;
  const userDoc = await getDoc(doc(db, "users", currentUser.uid));
  const userData = userDoc.data();
  await addDoc(collection(db, "posts", activePostId, "comments"), { text, username: userData.name, pfp: userData.pfp, timestamp: serverTimestamp() });
  document.getElementById("commentText").value = "";
};

onAuthStateChanged(auth, async (u) => {
  currentUser = u;
  document.getElementById("auth-container").style.display = u ? "none" : "flex";
  document.getElementById("app-container").style.display = u ? "flex" : "none";
  document.getElementById("openModal").style.display = u ? "flex" : "none";
  if(u) {
    const d = await getDoc(doc(db, "users", u.uid));
    document.getElementById("username").textContent = d.data().name;
    document.getElementById("pfp").src = d.data().pfp || "";
    document.getElementById("rank").textContent = "@" + d.data().rank.toLowerCase();
    startFeed();
  }
});
</script>
</body>
</html>
