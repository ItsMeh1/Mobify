<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobify Web</title>
    <style>
        /* General Reset and Body Styling */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; height: 100vh; background-color: #fafafa; }

        /* Left Sidebar */
        .sidebar {
            width: 350px;
            border-right: 4px solid #000;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Pushes search to bottom */
            background-color: #fff;
        }

        /* Profile Card */
        .profile-card {
            border: 2px solid #000;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            background-color: #f0f0f0;
        }
        .profile-pic {
            width: 60px;
            height: 60px;
            border: 2px solid #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            text-align: center;
            background-color: #e0e0e0;
        }
        .profile-info h3 { font-size: 18px; margin-bottom: 4px; }
        .profile-info p { font-size: 14px; color: #555; }

        /* Sidebar Middle Content */
        .sidebar-content { flex-grow: 1; padding: 40px 0; font-size: 20px; color: #666; }

        /* Search Bar */
        .search-bar {
            border: 2px solid #000;
            border-radius: 8px;
            padding: 15px;
            background-color: #f0f0f0;
            font-size: 16px;
        }

        /* Main Feed Area */
        .main-content {
            flex-grow: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #666;
        }

        /* Floating Action Buttons */
        .fab {
            position: absolute;
            width: 70px;
            height: 70px;
            border: 1px solid #000;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            text-align: center;
            background-color: #f0f0f0;
            cursor: pointer;
        }
        .fab-top-right { top: 20px; right: 20px; }
        .fab-bottom-right { bottom: 20px; right: 20px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <div class="profile-card">
                <div class="profile-pic">Profile<br>picture</div>
                <div class="profile-info">
                    <h3>User name</h3>
                    <p>Rank</p>
                </div>
            </div>
            
            <div class="sidebar-content">
                Whatever you want to put here
            </div>
        </div>

        <div class="search-bar">
            quick search...
        </div>
    </div>

    <div class="main-content">
        Posts go here

        <div class="fab fab-top-right">Add<br>new<br>post<br>btn</div>
        <div class="fab fab-bottom-right">Info<br>btn</div>
    </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { 
    getAuth, 
    onAuthStateChanged, 
    GoogleAuthProvider, 
    signInWithPopup 
  } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  import { getFirestore } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBprG8pYZ1WQNh2wt0kih3P7Z3nIxhnU5k",
    authDomain: "mobify-5b3c9.firebaseapp.com",
    projectId: "mobify-5b3c9",
    storageBucket: "mobify-5b3c9.firebasestorage.app",
    messagingSenderId: "454093361079",
    appId: "1:454093361079:web:ab1e1093a91a705be3a232"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  // --- 1. THE REDIRECT LOGIC ---
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      console.log("No user! Redirecting...");
      // If you have a separate login.html, uncomment the line below:
      // window.location.href = "login.html"; 
      
      // For now, let's just show an overlay so they can't use the app
      document.body.innerHTML = `
        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh;">
          <h1>Welcome to Mobify</h1>
          <p>Please sign in to continue</p>
          <button id="google-login" style="padding:10px 20px; cursor:pointer;">Sign in with Google</button>
        </div>
      `;
      
      document.getElementById('google-login').addEventListener('click', () => {
        signInWithPopup(auth, provider).then(() => window.location.reload());
      });
    } else {
      console.log("Welcome,", user.displayName);
      // Run your app initialization here (loadPosts, etc.)
    }
  });

  // --- 2. THE TAG DELETION LOGIC ---
  // Put this here so it listens globally for clicks on any "X" buttons
  document.addEventListener('click', (event) => {
    if (event.target.classList.contains('delete-btn')) {
      event.target.parentElement.remove(); 
    }
  });

</script>
</body>
</html>
