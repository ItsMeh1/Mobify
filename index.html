<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mobify | v4.0</title>
<meta name="color-scheme" content="dark" />
<style>
  :root {
    --bg: #000000;
    --bg-elevated: #0b0c0f;
    --panel-bg: #16181c;
    --panel-bg-2: #1d2128;
    --border: #2f3336;
    --border-soft: rgba(47, 51, 54, 0.7);
    --text-main: #e7e9ea;
    --text-muted: #71767b;
    --accent: #1d9bf0;
    --accent-hover: #1a8cd8;
    --success: #00ba7c;
    --danger: #f91880;
    --shadow: 0 12px 36px rgba(0, 0, 0, 0.35);
    --radius-xl: 24px;
    --radius-lg: 18px;
    --radius-md: 14px;
    --radius-sm: 10px;
    --content-max: 1280px;
    --sidebar-left: 280px;
    --sidebar-right: 350px;
  }

  * { box-sizing: border-box; }
  html { height: 100%; }
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at top, rgba(29, 155, 240, 0.12), transparent 30%), linear-gradient(180deg, #050608 0%, #000 100%);
    color: var(--text-main);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }

  /* UTILS */
  .hidden { display: none !important; }
  button { border: 0; background: none; color: inherit; cursor: pointer; transition: 0.2s; }
  
  /* TOASTS */
  .toast-container { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 9999; pointer-events: none; }
  .toast { background: var(--panel-bg-2); border: 1px solid var(--border); color: var(--text-main); padding: 12px 24px; border-radius: 99px; font-size: 14px; font-weight: 700; box-shadow: var(--shadow); opacity: 0; transform: translateY(20px); transition: 0.3s; display: flex; align-items: center; gap: 8px; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { border-color: var(--danger); color: var(--danger); }

  /* SHELL */
  .app-shell { display: none; width: 100%; height: 100vh; max-width: var(--content-max); margin: 0 auto; border-left: 1px solid var(--border-soft); border-right: 1px solid var(--border-soft); background: rgba(0, 0, 0, 0.22); backdrop-filter: blur(12px); }
  .layout { display: grid; grid-template-columns: var(--sidebar-left) minmax(0, 1fr) var(--sidebar-right); height: 100%; }
  
  /* SIDEBARS */
  .sidebar, .right-sidebar { height: 100%; overflow-y: auto; scrollbar-width: none; padding: 20px; border-right: 1px solid var(--border-soft); }
  .right-sidebar { border-right: 0; border-left: 1px solid var(--border-soft); }
  .logo { font-size: 28px; font-weight: 900; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
  .nav-btn { display: flex; align-items: center; gap: 15px; width: 100%; padding: 12px 15px; border-radius: 99px; font-size: 18px; font-weight: 600; margin-bottom: 5px; }
  .nav-btn:hover { background: rgba(255,255,255,0.1); }
  .nav-btn.active { color: var(--accent); background: rgba(29, 155, 240, 0.1); }

  /* FEED */
  .main { overflow-y: auto; position: relative; }
  .main-header { position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); padding: 15px 20px; border-bottom: 1px solid var(--border-soft); z-index: 10; }
  .post { padding: 15px 20px; border-bottom: 1px solid var(--border-soft); display: grid; grid-template-columns: 50px 1fr; gap: 15px; cursor: pointer; }
  .post:hover { background: rgba(255,255,255,0.02); }
  .avatar { width: 50px; height: 50px; border-radius: 50%; background: #222; object-fit: cover; }
  .avatar.small { width: 40px; height: 40px; }
  .avatar.large { width: 80px; height: 80px; }
  .post-header { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
  .post-name { font-weight: 800; }
  .post-handle { color: var(--text-muted); font-size: 14px; }
  .post-body { line-height: 1.5; white-space: pre-wrap; overflow-wrap: anywhere; }
  .post-media { width: 100%; border-radius: 15px; margin-top: 10px; border: 1px solid var(--border); }
  .tag-link { color: var(--accent); text-decoration: none; font-weight: 600; }

  /* AUTH */
  .auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .auth-card { width: 400px; padding: 40px; background: var(--bg-elevated); border-radius: 24px; border: 1px solid var(--border); box-shadow: var(--shadow); }
  .field { width: 100%; padding: 12px 15px; border-radius: 10px; border: 1px solid var(--border); background: #000; color: #fff; margin-bottom: 15px; }
  .btn-primary { width: 100%; padding: 12px; border-radius: 99px; background: var(--accent); color: #fff; font-weight: 800; }
  .btn-primary:hover { background: var(--accent-hover); }

  /* MODALS */
  .modal { position: fixed; inset: 0; background: rgba(91, 112, 131, 0.4); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .modal-box { background: #000; border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 500px; padding: 20px; max-height: 90vh; overflow-y: auto; }

  /* FAB */
  .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 30px; box-shadow: var(--shadow); z-index: 99; }

  /* TRENDING LIST */
  .trending-item { padding: 10px; border-radius: 10px; cursor: pointer; }
  .trending-item:hover { background: rgba(255,255,255,0.05); }
  .trending-tag { font-weight: 800; display: block; }
  .trending-count { font-size: 12px; color: var(--text-muted); }

  @media (max-width: 900px) {
    .sidebar, .right-sidebar { display: none; }
    .layout { grid-template-columns: 1fr; }
    .app-shell { border: 0; }
  }
</style>
</head>
<body>

<div id="toastContainer" class="toast-container"></div>

<div id="auth-container" class="auth-screen">
  <div class="auth-card">
    <h1 style="margin-top:0">Mobify</h1>
    <p id="authSubtitle" style="color:var(--text-muted)">Welcome back. Sign in to join the conversation.</p>
    <form id="authForm">
      <input id="username" class="field hidden" type="text" placeholder="Desired Username" />
      <input id="email" class="field" type="email" placeholder="Email Address" required />
      <input id="password" class="field" type="password" placeholder="Password" required />
      <button id="authSubmitBtn" class="btn-primary" type="submit">Log In</button>
      <button type="button" id="toggleAuthBtn" style="width:100%; margin-top:15px; color:var(--accent)">New here? Create account</button>
    </form>
  </div>
</div>

<div id="app-container" class="app-shell">
  <div class="layout">
    <aside class="sidebar">
      <div class="logo"><div style="width:12px; height:12px; background:var(--accent); border-radius:50%"></div> Mobify</div>
      <nav>
        <button class="nav-btn active" id="navHome"><span>🏠</span> Home</button>
        <button class="nav-btn" id="navTrending"><span>🔥</span> Trending</button>
        <button class="nav-btn" id="navMyProfile"><span>👤</span> Profile</button>
        <button class="nav-btn" id="logoutBtn" style="color:var(--danger); margin-top:20px"><span>🚪</span> Logout</button>
      </nav>
      <div style="margin-top:auto; padding-top:20px">
        <div style="display:flex; align-items:center; gap:10px">
          <img id="myPfp" class="avatar small" src="" />
          <div style="overflow:hidden">
            <div id="myUsername" style="font-weight:700; white-space:nowrap; text-overflow:ellipsis">User</div>
            <div id="myHandle" style="color:var(--text-muted); font-size:12px">@handle</div>
          </div>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="main-header">
        <h2 id="viewTitle" style="margin:0">Home</h2>
        <div id="filterIndicator" class="hidden" style="color:var(--accent); font-size:12px; margin-top:4px"></div>
      </div>
      <div id="feed"></div>
    </main>

    <aside class="right-sidebar">
      <input id="searchInput" class="field" type="search" placeholder="Search posts..." style="border-radius:99px" />
      <div style="background:var(--panel-bg); border-radius:20px; padding:20px">
        <h3 style="margin-top:0">Trending Tags</h3>
        <div id="trendingList"></div>
      </div>
    </aside>
  </div>
</div>

<button class="fab" id="openPostModal">+</button>

<div class="modal" id="createPostModal">
  <div class="modal-box">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px">
      <strong>Create Post</strong>
      <button id="closePostModal">✕</button>
    </div>
    <form id="createPostForm">
      <textarea id="postContent" class="field" rows="4" placeholder="What's happening?" style="resize:none" required></textarea>
      <input type="file" id="postImageFile" accept="image/*" class="hidden" />
      <button type="button" onclick="document.getElementById('postImageFile').click()" style="color:var(--accent); margin-bottom:15px">📷 Attach Image</button>
      <div id="imagePreviewContainer" class="hidden" style="position:relative; margin-bottom:15px">
        <img id="imagePreview" style="width:100%; border-radius:10px" />
        <button type="button" id="removeImage" style="position:absolute; top:5px; right:5px; background:#000; border-radius:50%; width:24px; height:24px">✕</button>
      </div>
      <button type="submit" id="submitPostBtn" class="btn-primary">Publish</button>
    </form>
  </div>
</div>

<div class="modal" id="profileModal">
  <div class="modal-box">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px">
      <strong>Profile</strong>
      <button onclick="document.getElementById('profileModal').style.display='none'">✕</button>
    </div>
    <div style="text-align:center">
      <img id="profPfp" class="avatar large" style="margin-bottom:10px" />
      <h2 id="profName" style="margin:0"></h2>
      <p id="profHandle" style="color:var(--text-muted); margin:5px 0 15px"></p>
      <p id="profStatus" style="font-style:italic; background:rgba(255,255,255,0.05); padding:10px; border-radius:10px"></p>
      <button id="editStatusBtn" class="hidden" style="color:var(--accent); font-size:12px">Edit Status</button>
    </div>
    <hr style="border:0; border-top:1px solid var(--border); margin:20px 0" />
    <div id="userPosts"></div>
  </div>
</div>

<template id="postTemplate">
  <article class="post">
    <img class="post-avatar" />
    <div>
      <div class="post-header"></div>
      <div class="post-body"></div>
      <img class="post-media hidden" />
    </div>
  </article>
</template>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, onSnapshot, query, orderBy, doc, getDoc, setDoc, addDoc, updateDoc, where } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBprG8pYZ1WQNh2wt0kih3P7Z3nIxhnU5k",
  authDomain: "mobify-5b3c9.firebaseapp.com",
  projectId: "mobify-5b3c9",
  storageBucket: "mobify-5b3c9.firebasestorage.app",
  messagingSenderId: "454093361079",
  appId: "1:454093361079:web:ab1e1093a91a705be3a232"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// State
let allPosts = [];
let currentUser = null;
let currentMode = "home"; // home, trending
let tagFilter = null;
let isLoginMode = true;
let selectedBase64 = "";

const els = {
  authForm: document.getElementById("authForm"),
  authContainer: document.getElementById("auth-container"),
  appContainer: document.getElementById("app-container"),
  feed: document.getElementById("feed"),
  trendingList: document.getElementById("trendingList"),
  searchInput: document.getElementById("searchInput"),
  myUsername: document.getElementById("myUsername"),
  myHandle: document.getElementById("myHandle"),
  myPfp: document.getElementById("myPfp"),
  viewTitle: document.getElementById("viewTitle"),
  filterIndicator: document.getElementById("filterIndicator")
};

// Utils
const showToast = (m, t="success") => {
  const c = document.getElementById("toastContainer");
  const d = document.createElement("div");
  d.className = `toast ${t} show`;
  d.innerHTML = m;
  c.appendChild(d);
  setTimeout(() => { d.classList.remove("show"); setTimeout(() => d.remove(), 300); }, 3000);
};

const getHandle = (n) => `@${n.toLowerCase().replace(/\s+/g, '')}`;

// Core Rendering
function renderFeed() {
  let posts = [...allPosts];
  
  // Apply Tag Filter
  if (tagFilter) {
    posts = posts.filter(p => p.content.includes(tagFilter));
    els.filterIndicator.textContent = `Showing results for ${tagFilter}`;
    els.filterIndicator.classList.remove("hidden");
  } else {
    els.filterIndicator.classList.add("hidden");
  }

  // Apply Search
  const search = els.searchInput.value.toLowerCase();
  if (search) {
    posts = posts.filter(p => p.content.toLowerCase().includes(search) || p.username.toLowerCase().includes(search));
  }

  els.feed.innerHTML = posts.length ? "" : '<div style="padding:40px; text-align:center; color:var(--text-muted)">No posts found.</div>';
  posts.forEach(post => {
    const temp = document.getElementById("postTemplate").content.firstElementChild.cloneNode(true);
    temp.querySelector(".post-avatar").src = post.userProfilePic || `https://ui-avatars.com/api/?name=${post.username}&background=random`;
    temp.querySelector(".post-header").innerHTML = `<span class="post-name">${post.username}</span> <span class="post-handle">${getHandle(post.username)}</span>`;
    temp.querySelector(".post-body").innerHTML = post.content.replace(/(#\w+)/g, '<span class="tag-link">$1</span>');
    if (post.imageURL) {
      const img = temp.querySelector(".post-media");
      img.src = post.imageURL;
      img.classList.remove("hidden");
    }
    temp.onclick = () => viewProfile(post.userId);
    els.feed.appendChild(temp);
  });
}

function updateTrending() {
  const counts = {};
  allPosts.forEach(p => {
    const tags = p.content.match(/#\w+/g) || [];
    tags.forEach(t => counts[t] = (counts[t] || 0) + 1);
  });
  const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]).slice(0, 5);
  els.trendingList.innerHTML = sorted.length ? "" : "No trends yet.";
  sorted.forEach(([tag, count]) => {
    const div = document.createElement("div");
    div.className = "trending-item";
    div.innerHTML = `<span class="trending-tag">${tag}</span><span class="trending-count">${count} posts</span>`;
    div.onclick = () => { tagFilter = tag; renderFeed(); };
    els.trendingList.appendChild(div);
  });
}

async function viewProfile(uid) {
  const snap = await getDoc(doc(db, "users", uid));
  if (!snap.exists()) return;
  const data = snap.data();
  document.getElementById("profName").textContent = data.name;
  document.getElementById("profHandle").textContent = getHandle(data.name);
  document.getElementById("profPfp").src = data.pfp || `https://ui-avatars.com/api/?name=${data.name}&background=random`;
  document.getElementById("profStatus").textContent = data.status || "No status set.";
  
  const editBtn = document.getElementById("editStatusBtn");
  editBtn.classList.toggle("hidden", uid !== auth.currentUser.uid);
  editBtn.onclick = async () => {
    const s = prompt("Update status:", data.status);
    if (s) {
      await updateDoc(doc(db, "users", uid), { status: s });
      viewProfile(uid);
    }
  };

  const uPosts = allPosts.filter(p => p.userId === uid);
  const container = document.getElementById("userPosts");
  container.innerHTML = "";
  uPosts.forEach(p => {
    const d = document.createElement("div");
    d.style.padding = "10px";
    d.style.borderBottom = "1px solid #222";
    d.textContent = p.content;
    container.appendChild(d);
  });
  document.getElementById("profileModal").style.display = "flex";
}

// Listeners
document.getElementById("toggleAuthBtn").onclick = () => {
  isLoginMode = !isLoginMode;
  document.getElementById("username").classList.toggle("hidden", isLoginMode);
  document.getElementById("authSubmitBtn").textContent = isLoginMode ? "Log In" : "Sign Up";
  document.getElementById("authSubtitle").textContent = isLoginMode ? "Welcome back." : "Create your profile.";
};

els.authForm.onsubmit = async (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  const user = document.getElementById("username").value;

  try {
    if (!isLoginMode) {
      if (!user) return showToast("Username is required", "error");
      const res = await createUserWithEmailAndPassword(auth, email, pass);
      await setDoc(doc(db, "users", res.user.uid), { name: user, status: "Just joined!", pfp: "" });
    } else {
      await signInWithEmailAndPassword(auth, email, pass);
    }
  } catch (err) { showToast(err.message, "error"); }
};

document.getElementById("logoutBtn").onclick = () => signOut(auth);

document.getElementById("navHome").onclick = () => { tagFilter = null; els.searchInput.value = ""; renderFeed(); };
document.getElementById("navTrending").onclick = () => {
  // Simple "Trending" view: sort by tag count or just most recent with tags
  tagFilter = null;
  allPosts.sort((a,b) => (b.content.match(/#/g)||[]).length - (a.content.match(/#/g)||[]).length);
  renderFeed();
};
document.getElementById("navMyProfile").onclick = () => viewProfile(auth.currentUser.uid);

els.searchInput.oninput = renderFeed;

document.getElementById("openPostModal").onclick = () => document.getElementById("createPostModal").style.display = "flex";
document.getElementById("closePostModal").onclick = () => document.getElementById("createPostModal").style.display = "none";

document.getElementById("postImageFile").onchange = (e) => {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      selectedBase64 = ev.target.result;
      document.getElementById("imagePreview").src = selectedBase64;
      document.getElementById("imagePreviewContainer").classList.remove("hidden");
    };
    reader.readAsDataURL(file);
  }
};

document.getElementById("createPostForm").onsubmit = async (e) => {
  e.preventDefault();
  const content = document.getElementById("postContent").value;
  const btn = document.getElementById("submitPostBtn");
  btn.disabled = true;

  try {
    await addDoc(collection(db, "posts"), {
      userId: auth.currentUser.uid,
      username: els.myUsername.textContent,
      userProfilePic: els.myPfp.src,
      content,
      imageURL: selectedBase64,
      timestamp: new Date().toISOString()
    });
    document.getElementById("createPostForm").reset();
    selectedBase64 = "";
    document.getElementById("imagePreviewContainer").classList.add("hidden");
    document.getElementById("createPostModal").style.display = "none";
    showToast("Posted!");
  } catch (err) { showToast("Error", "error"); }
  btn.disabled = false;
};

// Auth Watcher
onAuthStateChanged(auth, async (user) => {
  if (user) {
    const snap = await getDoc(doc(db, "users", user.uid));
    if (!snap.exists()) {
       // Backup in case doc creation failed during signup
       await setDoc(doc(db, "users", user.uid), { name: user.email.split('@')[0], status: "Hello!", pfp: "" });
       location.reload();
    }
    const data = snap.data();
    els.myUsername.textContent = data.name;
    els.myHandle.textContent = getHandle(data.name);
    els.myPfp.src = data.pfp || `https://ui-avatars.com/api/?name=${data.name}&background=random`;
    
    els.authContainer.style.display = "none";
    els.appContainer.style.display = "block";

    onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (s) => {
      allPosts = s.docs.map(d => ({id: d.id, ...d.data()}));
      renderFeed();
      updateTrending();
    });
  } else {
    els.authContainer.style.display = "flex";
    els.appContainer.style.display = "none";
  }
});
</script>
</body>
</html>
