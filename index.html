<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobify</title>
<style>
  :root {
    --bg: #000000;
    --panel-bg: #16181c;
    --border: #2f3336;
    --text-main: #e7e9ea;
    --text-muted: #71767b;
    --accent: #1d9bf0;
    --accent-hover: #1a8cd8;
  }

  * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
  body { background: var(--bg); color: var(--text-main); display: flex; justify-content: center; height: 100vh; overflow: hidden; }

  /* Layout */
  #app-container { display: none; width: 100%; max-width: 1200px; height: 100vh; }
  .sidebar { width: 275px; border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; justify-content: space-between; }
  .main { flex: 1; border-right: 1px solid var(--border); overflow-y: auto; scrollbar-width: none; }
  .right-sidebar { width: 350px; padding: 20px; }

  /* Posts */
  .post { padding: 15px 20px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; gap: 12px; }
  .post:hover { background: rgba(255, 255, 255, 0.03); }
  .post-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
  .post-image { width: 100%; border-radius: 16px; margin-top: 10px; border: 1px solid var(--border); }

  /* SCROLLABLE DETAIL MODAL */
  .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(91, 112, 131, 0.4); display: none; align-items: center; justify-content: center; z-index: 200; }
  .modal-box { 
    background: var(--bg); 
    width: 100%; 
    max-width: 600px; 
    max-height: 90vh; /* Limits height */
    border-radius: 16px; 
    display: flex; 
    flex-direction: column; 
    overflow: hidden; /* Clips the box, child will scroll */
  }
  
  .modal-header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg); }
  
  .modal-body { 
    flex: 1; 
    overflow-y: auto; /* THIS MAKES IT SCROLLABLE */
    padding: 20px; 
    scrollbar-width: thin;
  }

  /* Comments Section */
  .comment-input-area { padding: 15px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: var(--bg); }
  .comment-input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 16px; }
  .comment-item { padding: 12px 0; border-bottom: 1px solid #111; display: flex; gap: 10px; }
  .comment-avatar { width: 32px; height: 32px; border-radius: 50%; }

  .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background: var(--accent); color: white; display: none; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; }
</style>
</head>
<body>

<div id="auth-container" style="display:flex; justify-content:center; align-items:center; height:100vh; width:100%;">
    <button onclick="login()" class="btn-primary" style="padding: 15px 30px; background: var(--accent); border:none; border-radius:30px; color:white; font-weight:bold; cursor:pointer;">Click to Log In (Demo Mode)</button>
</div>

<div id="app-container">
  <div class="sidebar">
    <div class="logo" style="font-size:24px; font-weight:bold;">Mobify</div>
    <div class="profile-card" style="display:flex; align-items:center; gap:10px;">
      <img id="pfp" style="width:40px; height:40px; border-radius:50%;">
      <span id="username"></span>
    </div>
  </div>

  <div class="main">
    <div class="header" style="padding:15px; font-weight:bold; border-bottom:1px solid var(--border);">Home</div>
    <div id="feed"></div>
  </div>

  <div class="right-sidebar">
    <input type="text" placeholder="Search..." style="width:100%; padding:10px; border-radius:20px; background:var(--panel-bg); border:none; color:white;">
  </div>
</div>

<div class="modal" id="detailModal">
  <div class="modal-box">
    <div class="modal-header">
      <strong>Post</strong>
      <div id="closeDetail" style="cursor:pointer">✕</div>
    </div>
    
    <div class="modal-body" id="detailScrollBody">
      <div id="detailContent"></div>
      <hr style="border:0; border-top:1px solid var(--border); margin:20px 0;">
      <div id="commentsList"></div>
    </div>

    <div class="comment-input-area">
      <input type="text" id="commentText" class="comment-input" placeholder="Post your reply">
      <button id="submitComment" style="background:var(--accent); border:none; color:white; padding:5px 15px; border-radius:20px; font-weight:bold; cursor:pointer;">Reply</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBprG8pYZ1WQNh2wt0kih3P7Z3nIxhnU5k",
  authDomain: "mobify-5b3c9.firebaseapp.com",
  projectId: "mobify-5b3c9",
  storageBucket: "mobify-5b3c9.firebasestorage.app",
  messagingSenderId: "454093361079",
  appId: "1:454093361079:web:ab1e1093a91a705be3a232"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let currentUser = null;
let activePostId = null;

// --- LOAD POSTS ---
function startFeed() {
  const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
  onSnapshot(q, (snap) => {
    const feed = document.getElementById("feed");
    feed.innerHTML = "";
    snap.forEach(d => {
      const p = d.data();
      feed.innerHTML += `
        <div class="post" onclick="openDetail('${d.id}')">
          <img src="${p.userProfilePic}" class="post-avatar">
          <div class="post-body">
            <strong>${p.username}</strong>
            <div class="post-text">${p.content}</div>
            ${p.imageURL ? `<img src="${p.imageURL}" class="post-image">` : ""}
          </div>
        </div>`;
    });
  });
}

// --- OPEN DETAIL & START COMMENT LISTENER ---
window.openDetail = async (id) => {
  activePostId = id;
  const postSnap = await getDoc(doc(db, "posts", id));
  const post = postSnap.data();
  
  document.getElementById("detailContent").innerHTML = `
    <div style="display:flex; gap:12px; margin-bottom:15px;">
      <img src="${post.userProfilePic}" style="width:48px; height:48px; border-radius:50%;">
      <strong>${post.username}</strong>
    </div>
    <p style="font-size:18px; margin-bottom:15px;">${post.content}</p>
    ${post.imageURL ? `<img src="${post.imageURL}" style="width:100%; border-radius:12px;">` : ""}
  `;

  // Listen for comments in real-time
  const q = query(collection(db, "posts", id, "comments"), orderBy("timestamp", "asc"));
  onSnapshot(q, (snap) => {
    const list = document.getElementById("commentsList");
    list.innerHTML = snap.empty ? `<p style="color:var(--text-muted)">No comments yet.</p>` : "";
    snap.forEach(d => {
      const c = d.data();
      list.innerHTML += `
        <div class="comment-item">
          <img src="${c.pfp || 'https://via.placeholder.com/30'}" class="comment-avatar">
          <div>
            <strong>${c.username}</strong>
            <div style="font-size:14px;">${c.text}</div>
          </div>
        </div>`;
    });
  });

  document.getElementById("detailModal").style.display = "flex";
};

// --- POST A COMMENT ---
document.getElementById("submitComment").onclick = async () => {
  const text = document.getElementById("commentText").value;
  if(!text || !activePostId) return;

  const userDoc = await getDoc(doc(db, "users", currentUser.uid));
  const userData = userDoc.data();

  await addDoc(collection(db, "posts", activePostId, "comments"), {
    text: text,
    username: userData.name,
    pfp: userData.pfp,
    timestamp: serverTimestamp()
  });

  document.getElementById("commentText").value = "";
};

// --- AUTH ---
onAuthStateChanged(auth, u => {
  if(u) {
    currentUser = u;
    document.getElementById("auth-container").style.display = "none";
    document.getElementById("app-container").style.display = "flex";
    startFeed();
  }
});

// Demo Login (Since you likely have an account)
window.login = () => {
    const email = prompt("Email?");
    const pass = prompt("Password?");
    signInWithEmailAndPassword(auth, email, pass);
};

document.getElementById("closeDetail").onclick = () => document.getElementById("detailModal").style.display = "none";
</script>
</body>
</html>
