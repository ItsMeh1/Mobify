<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mobify | v4.2</title>
<meta name="color-scheme" content="dark" />
<style>
  :root {
    --bg: #000;
    --bg-elevated: #0b0c0f;
    --panel: #16181c;
    --border: #2f3336;
    --text: #e7e9ea;
    --muted: #71767b;
    --accent: #1d9bf0;
    --danger: #f91880;
    --radius: 16px;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }

  .hidden { display: none !important; }
  button { border: 0; background: none; color: inherit; cursor: pointer; transition: 0.2s; }
  
  /* LAYOUT */
  .app-shell { display: none; width: 100%; height: 100vh; max-width: 1250px; margin: 0 auto; display: grid; grid-template-columns: 275px 1fr 350px; }

  /* SIDEBARS */
  .sidebar, .right-sidebar { padding: 20px; border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
  .right-sidebar { border-right: 0; border-left: 1px solid var(--border); gap: 20px; }
  
  .nav-btn { display: flex; align-items: center; gap: 15px; width: 100%; padding: 12px 20px; border-radius: 99px; font-size: 19px; font-weight: 600; margin-bottom: 8px; }
  .nav-btn:hover { background: rgba(255,255,255,0.1); }
  .nav-btn.active { color: var(--accent); }

  /* AVATARS (STRICT FIX) */
  .avatar { 
    width: 48px !important; 
    height: 48px !important; 
    border-radius: 50%; 
    object-fit: cover; 
    background: #222; 
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .avatar.large { width: 90px !important; height: 90px !important; }
  .avatar.small { width: 36px !important; height: 36px !important; }

  /* FEED & POSTS */
  .main { overflow-y: auto; border-right: 1px solid var(--border); }
  .main-header { position: sticky; top: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); padding: 15px 20px; border-bottom: 1px solid var(--border); z-index: 10; }
  
  .post { display: flex; gap: 12px; padding: 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.1s; }
  .post:hover { background: rgba(255,255,255,0.03); }
  .post-content { flex: 1; min-width: 0; }
  .post-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .post-name { font-weight: 800; }
  .post-handle { color: var(--muted); font-size: 14px; }
  .post-body { line-height: 1.4; font-size: 15px; overflow-wrap: break-word; }
  .post-media { width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid var(--border); max-height: 500px; object-fit: cover; }

  /* RULES & TRENDS CARDS */
  .card { background: var(--panel); border-radius: var(--radius); padding: 18px; border: 1px solid var(--border); }
  .card h3 { margin: 0 0 15px; font-size: 18px; }
  .rule-item { font-size: 14px; color: var(--muted); margin-bottom: 8px; display: flex; gap: 8px; }
  .rule-item::before { content: "•"; color: var(--accent); }
  
  .trend-item { padding: 10px 0; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .trend-item:last-child { border: 0; }
  .trend-tag { color: var(--accent); font-weight: 800; display: block; }
  .trend-count { font-size: 12px; color: var(--muted); }

  /* MODALS (NON-GOOFY VERSION) */
  .modal { position: fixed; inset: 0; background: rgba(91, 112, 131, 0.5); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; backdrop-filter: blur(4px); }
  .modal-box { background: #000; border: 1px solid var(--border); border-radius: 24px; width: 100%; max-width: 500px; overflow: hidden; position: relative; }
  
  .profile-banner { height: 120px; background: linear-gradient(45deg, #1d9bf0, #00ba7c); }
  .profile-info { padding: 0 20px 20px; text-align: center; }
  .profile-pfp-wrapper { margin-top: -45px; margin-bottom: 10px; display: inline-block; position: relative; }
  
  .input-field { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); border-radius: 10px; color: #fff; margin-bottom: 15px; font-family: inherit; }
  .btn-primary { width: 100%; padding: 12px; background: var(--accent); border-radius: 99px; font-weight: 800; color: #fff; }

  .fab { position: fixed; bottom: 30px; right: 30px; width: 56px; height: 56px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); z-index: 50; }

  @media (max-width: 900px) {
    .right-sidebar { display: none; }
    .app-shell { grid-template-columns: 80px 1fr; }
    .nav-btn span:last-child { display: none; }
  }
</style>
</head>
<body>

<div id="auth-container" style="display: flex; align-items: center; justify-content: center; height: 100vh;">
  <div class="card" style="width: 350px;">
    <h2 style="margin-top:0">Mobify</h2>
    <form id="authForm">
      <input id="username" class="input-field hidden" type="text" placeholder="Username" />
      <input id="email" class="input-field" type="email" placeholder="Email" required />
      <input id="password" class="input-field" type="password" placeholder="Password" required />
      <button type="submit" id="authSubmitBtn" class="btn-primary">Log In</button>
      <button type="button" id="toggleAuthBtn" style="width:100%; margin-top:15px; color:var(--accent); font-size:13px;">Need an account? Sign Up</button>
    </form>
  </div>
</div>

<div id="app-container" class="app-shell" style="display:none;">
  <aside class="sidebar">
    <h2 style="margin-bottom:30px; padding-left:15px">Mobify</h2>
    <nav>
      <button class="nav-btn active" id="btnHome"><span>🏠</span> <span>Home</span></button>
      <button class="nav-btn" id="btnTrending"><span>🔥</span> <span>Trending</span></button>
      <button class="nav-btn" id="navMyProfile"><span>👤</span> <span>Profile</span></button>
      <button class="nav-btn" id="logoutBtn" style="color:var(--danger); margin-top:20px"><span>🚪</span> <span>Logout</span></button>
    </nav>
    <div style="margin-top:auto; padding:20px 0; display:flex; align-items:center; gap:12px; border-top:1px solid var(--border)">
      <img id="myPfp" class="avatar small" />
      <div style="min-width:0">
        <div id="myUsername" style="font-weight:700; overflow:hidden; text-overflow:ellipsis">User</div>
        <div id="myHandle" style="color:var(--muted); font-size:12px">@handle</div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="main-header"><h2 id="viewTitle" style="margin:0">Home</h2></div>
    <div id="feed"></div>
  </main>

  <aside class="right-sidebar">
    <input id="searchInput" class="input-field" type="search" placeholder="Search posts..." style="border-radius:99px" />
    
    <div class="card">
      <h3>📜 Rules</h3>
      <div class="rule-item">Be respectful.</div>
      <div class="rule-item">No spamming.</div>
      <div class="rule-item">Keep it SFW.</div>
      <div class="rule-item">No impersonation.</div>
    </div>

    <div class="card">
      <h3>🔥 Trending</h3>
      <div id="trendingList"></div>
    </div>
  </aside>
</div>

<button class="fab" id="openPostModal">+</button>

<div class="modal" id="createPostModal">
  <div class="modal-box" style="padding: 20px;">
    <h3 style="margin-top:0">New Post</h3>
    <form id="createPostForm">
      <textarea id="postContent" class="input-field" rows="4" placeholder="What's happening?" style="resize:none"></textarea>
      <input type="file" id="postImageFile" accept="image/*" class="hidden" />
      <button type="button" onclick="document.getElementById('postImageFile').click()" style="color:var(--accent); margin-bottom:15px">🖼️ Add Photo</button>
      <div id="imagePreviewContainer" class="hidden" style="margin-bottom:15px"><img id="imagePreview" style="width:100%; border-radius:12px" /></div>
      <button type="submit" class="btn-primary">Post</button>
      <button type="button" onclick="closeModals()" style="width:100%; margin-top:10px; color:var(--muted)">Cancel</button>
    </form>
  </div>
</div>

<div class="modal" id="profileModal">
  <div class="modal-box">
    <div class="profile-banner"></div>
    <div class="profile-info">
      <div class="profile-pfp-wrapper">
        <img id="profPfp" class="avatar large" style="border: 4px solid #000;" />
      </div>
      <h2 id="profName" style="margin:0">Name</h2>
      <p id="profHandle" style="color:var(--muted); margin:4px 0 12px">@handle</p>
      <p id="profStatus" style="font-size:15px; line-height:1.4; margin-bottom:15px; color:var(--text)"></p>
      <button id="editStatusBtn" class="hidden" style="color:var(--accent); font-size:13px; font-weight:bold; border:1px solid var(--border); padding:5px 15px; border-radius:99px">Edit Status</button>
    </div>
    <div id="userPosts" style="max-height:250px; overflow-y:auto; border-top:1px solid var(--border)"></div>
    <button onclick="closeModals()" style="position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.5); width:30px; height:30px; border-radius:50%">✕</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, onSnapshot, query, orderBy, doc, getDoc, setDoc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBprG8pYZ1WQNh2wt0kih3P7Z3nIxhnU5k",
  authDomain: "mobify-5b3c9.firebaseapp.com",
  projectId: "mobify-5b3c9",
  storageBucket: "mobify-5b3c9.firebasestorage.app",
  messagingSenderId: "454093361079",
  appId: "1:454093361079:web:ab1e1093a91a705be3a232"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let allPosts = [];
let selectedBase64 = "";

const getHandle = (n) => `@${n.toLowerCase().replace(/\s+/g, '')}`;

function renderFeed() {
  const feed = document.getElementById("feed");
  const search = document.getElementById("searchInput").value.toLowerCase();
  
  let filtered = allPosts.filter(p => p.content.toLowerCase().includes(search) || p.username.toLowerCase().includes(search));
  
  feed.innerHTML = filtered.length ? "" : '<div style="padding:40px; text-align:center; color:var(--muted)">No posts found</div>';
  
  filtered.forEach(post => {
    const div = document.createElement("div");
    div.className = "post";
    div.innerHTML = `
      <img class="avatar" src="${post.userProfilePic || 'https://ui-avatars.com/api/?name='+post.username}" />
      <div class="post-content">
        <div class="post-header"><span class="post-name">${post.username}</span> <span class="post-handle">${getHandle(post.username)}</span></div>
        <div class="post-body">${post.content.replace(/(#\w+)/g, '<span style="color:var(--accent)">$1</span>')}</div>
        ${post.imageURL ? `<img class="post-media" src="${post.imageURL}" />` : ''}
      </div>
    `;
    div.onclick = (e) => { if(!e.target.closest('button')) viewProfile(post.userId); };
    feed.appendChild(div);
  });
}

function updateTrends() {
  const counts = {};
  allPosts.forEach(p => {
    const tags = p.content.match(/#\w+/g) || [];
    tags.forEach(t => counts[t] = (counts[t] || 0) + 1);
  });
  const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]).slice(0, 5);
  const list = document.getElementById("trendingList");
  list.innerHTML = sorted.length ? "" : '<span style="color:var(--muted)">No trends yet.</span>';
  sorted.forEach(([tag, count]) => {
    const item = document.createElement("div");
    item.className = "trend-item";
    item.innerHTML = `<span class="trend-tag">${tag}</span><span class="trend-count">${count} posts</span>`;
    item.onclick = () => { document.getElementById("searchInput").value = tag; renderFeed(); };
    list.appendChild(item);
  });
}

async function viewProfile(uid) {
  const snap = await getDoc(doc(db, "users", uid));
  if (!snap.exists()) return;
  const data = snap.data();
  
  document.getElementById("profName").textContent = data.name;
  document.getElementById("profHandle").textContent = getHandle(data.name);
  document.getElementById("profPfp").src = data.pfp || 'https://ui-avatars.com/api/?name='+data.name;
  document.getElementById("profStatus").textContent = data.status || "Hello! I'm on Mobify.";
  
  const editBtn = document.getElementById("editStatusBtn");
  editBtn.classList.toggle("hidden", uid !== auth.currentUser.uid);
  editBtn.onclick = async () => {
    const newStatus = prompt("Update your status:", data.status || "");
    if (newStatus !== null) {
      await updateDoc(doc(db, "users", uid), { status: newStatus });
      viewProfile(uid); // Refresh modal
    }
  };

  const postContainer = document.getElementById("userPosts");
  postContainer.innerHTML = "";
  allPosts.filter(p => p.userId === uid).forEach(p => {
    const d = document.createElement("div");
    d.style.padding = "12px 20px"; d.style.borderBottom = "1px solid var(--border)";
    d.textContent = p.content;
    postContainer.appendChild(d);
  });
  
  document.getElementById("profileModal").style.display = "flex";
}

window.closeModals = () => document.querySelectorAll(".modal").forEach(m => m.style.display = "none");

// EVENTS
document.getElementById("searchInput").oninput = renderFeed;
document.getElementById("toggleAuthBtn").onclick = () => {
  const isLogin = document.getElementById("username").classList.toggle("hidden");
  document.getElementById("authSubmitBtn").textContent = isLogin ? "Log In" : "Sign Up";
};

document.getElementById("authForm").onsubmit = async (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  const name = document.getElementById("username").value;
  const isSignUp = !document.getElementById("username").classList.contains("hidden");

  try {
    if (isSignUp) {
      const res = await createUserWithEmailAndPassword(auth, email, pass);
      await setDoc(doc(db, "users", res.user.uid), { name, status: "Just joined!", pfp: "" });
    } else {
      await signInWithEmailAndPassword(auth, email, pass);
    }
  } catch (err) { alert(err.message); }
};

document.getElementById("logoutBtn").onclick = () => signOut(auth);
document.getElementById("navMyProfile").onclick = () => viewProfile(auth.currentUser.uid);
document.getElementById("btnHome").onclick = () => { document.getElementById("searchInput").value = ""; renderFeed(); };
document.getElementById("openPostModal").onclick = () => document.getElementById("createPostModal").style.display = "flex";

document.getElementById("postImageFile").onchange = (e) => {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      selectedBase64 = ev.target.result;
      document.getElementById("imagePreview").src = selectedBase64;
      document.getElementById("imagePreviewContainer").classList.remove("hidden");
    };
    reader.readAsDataURL(file);
  }
};

document.getElementById("createPostForm").onsubmit = async (e) => {
  e.preventDefault();
  const content = document.getElementById("postContent").value;
  if(!content && !selectedBase64) return;
  await addDoc(collection(db, "posts"), {
    userId: auth.currentUser.uid,
    username: document.getElementById("myUsername").textContent,
    userProfilePic: document.getElementById("myPfp").src,
    content,
    imageURL: selectedBase64,
    timestamp: new Date().toISOString()
  });
  document.getElementById("createPostForm").reset();
  selectedBase64 = "";
  document.getElementById("imagePreviewContainer").classList.add("hidden");
  closeModals();
};

onAuthStateChanged(auth, async (user) => {
  if (user) {
    const snap = await getDoc(doc(db, "users", user.uid));
    const data = snap.data();
    document.getElementById("myUsername").textContent = data?.name || "User";
    document.getElementById("myHandle").textContent = getHandle(data?.name || "user");
    document.getElementById("myPfp").src = data?.pfp || 'https://ui-avatars.com/api/?name='+(data?.name || 'U');
    document.getElementById("auth-container").style.display = "none";
    document.getElementById("app-container").style.display = "grid";

    onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (s) => {
      allPosts = s.docs.map(d => ({id: d.id, ...d.data()}));
      renderFeed();
      updateTrends();
    });
  } else {
    document.getElementById("auth-container").style.display = "flex";
    document.getElementById("app-container").style.display = "none";
  }
});
</script>
</body>
</html>
